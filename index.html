<!doctype html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Outside Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
/* Outside Studio — Cyberpunk neon, emerald + cyan on midnight */
:root {
  --bg: #070b14;
  --bg-2: #0b1220;
  --panel: #0f172a;
  --panel-2: #111b30;
  --border: rgba(148, 197, 255, 0.08);
  --border-strong: rgba(148, 197, 255, 0.18);
  --text: #e6f1ff;
  --text-dim: #8ea3c4;
  --text-muted: #5b6f8f;
  --accent: oklch(0.82 0.16 165);   /* emerald */
  --accent-2: oklch(0.82 0.14 220); /* cyan */
  --accent-warm: oklch(0.78 0.15 55); /* warm accent for variety */
  --glow: oklch(0.82 0.16 165 / 0.35);
  --glow-2: oklch(0.82 0.14 220 / 0.35);
  --radius: 6px;
  --radius-lg: 14px;
  --mono: "JetBrains Mono", ui-monospace, monospace;
  --display: "Space Grotesk", "Inter", system-ui, sans-serif;
  --body: "Inter", system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: var(--body); -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body {
  min-height: 100vh;
  overflow-x: hidden;
  background:
    radial-gradient(1200px 600px at 10% -10%, oklch(0.82 0.16 165 / 0.08), transparent 60%),
    radial-gradient(1000px 500px at 100% 10%, oklch(0.82 0.14 220 / 0.07), transparent 60%),
    var(--bg);
}

/* ---- global ---- */
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
img { display: block; max-width: 100%; }
::selection { background: var(--accent); color: #031018; }

.container {
  width: 100%;
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
}

.kicker {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  color: var(--accent);
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.kicker::before {
  content: "";
  width: 28px; height: 1px;
  background: var(--accent);
  box-shadow: 0 0 10px var(--glow);
}

.section-title {
  font-family: var(--display);
  font-size: clamp(32px, 4.2vw, 56px);
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.05;
  margin-top: 16px;
  text-wrap: balance;
}
.section-sub {
  color: var(--text-dim);
  font-size: 17px;
  margin-top: 14px;
  max-width: 620px;
  line-height: 1.6;
}

section { padding: 120px 0; position: relative; }

/* ---- scanline grid bg ---- */
.grid-bg {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(to right, rgba(148, 197, 255, 0.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(148, 197, 255, 0.04) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
  pointer-events: none;
  z-index: 0;
}
.noise {
  position: fixed; inset: 0;
  pointer-events: none;
  opacity: 0.035;
  z-index: 1;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='1'/></svg>");
}

/* ---- nav ---- */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  backdrop-filter: blur(18px);
  background: rgba(7, 11, 20, 0.72);
  border-bottom: 1px solid var(--border);
  transition: background .3s;
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 32px;
  max-width: 1320px;
  margin: 0 auto;
}
.logo {
  display: flex; align-items: center; gap: 12px;
  font-family: var(--display);
  font-weight: 600;
  font-size: 18px;
  letter-spacing: -0.01em;
}
.logo-svg {
  filter: drop-shadow(0 0 8px var(--glow));
  transition: transform 0.4s ease, filter 0.4s ease;
}
.logo:hover .logo-svg {
  transform: rotate(15deg) scale(1.08);
  filter: drop-shadow(0 0 14px var(--glow));
}
.logo-mark {
  width: 32px; height: 32px;
  border: 1.5px solid var(--accent);
  position: relative;
  display: grid; place-items: center;
  box-shadow: 0 0 14px var(--glow), inset 0 0 14px var(--glow);
  background: var(--bg-2);
  transform: rotate(45deg);
}
.logo-mark::before {
  content: "";
  width: 10px; height: 10px;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
}
.logo-mark::after {
  content: "";
  position: absolute;
  inset: -4px;
  border: 1px solid var(--accent);
  opacity: 0.3;
}
.logo-text { font-weight: 600; }
.logo-text span { color: var(--accent); }

.nav-links {
  display: flex; gap: 4px;
  font-size: 14px;
  font-family: var(--mono);
}
.nav-links a {
  padding: 8px 14px;
  color: var(--text-dim);
  border-radius: 4px;
  transition: color .2s, background .2s;
  letter-spacing: 0.02em;
}
.nav-links a:hover { color: var(--text); background: rgba(148, 197, 255, 0.05); }

.nav-actions { display: flex; gap: 10px; align-items: center; }
.lang-toggle {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.1em;
  padding: 8px 12px;
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  color: var(--text-dim);
  transition: all .2s;
}
.lang-toggle:hover { color: var(--accent); border-color: var(--accent); }

/* ---- buttons ---- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-radius: 4px;
  transition: all .2s;
  position: relative;
  cursor: pointer;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  color: #041812;
  font-weight: 600;
  box-shadow: 0 0 0 0 var(--glow), 0 10px 40px -10px var(--glow);
}
.btn-primary:hover {
  box-shadow: 0 0 0 4px var(--glow), 0 16px 50px -6px var(--glow);
  transform: translateY(-1px);
}
.btn-ghost {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border-strong);
}
.btn-ghost:hover {
  border-color: var(--accent-2);
  color: var(--accent-2);
  background: rgba(108, 211, 255, 0.04);
}
.btn .arrow { transition: transform .2s; }
.btn:hover .arrow { transform: translateX(3px); }

/* ---- hero ---- */
.hero {
  padding: 180px 0 100px;
  position: relative;
  overflow: hidden;
}
.hero-inner { position: relative; z-index: 2; display: grid; gap: 40px; }
.hero-kicker {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.2em;
  color: var(--accent);
  padding: 8px 14px;
  border: 1px solid var(--accent);
  border-radius: 100px;
  background: rgba(47, 226, 168, 0.04);
  width: fit-content;
}
.hero-kicker .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.2); }
}
.hero-title {
  font-family: var(--display);
  font-size: clamp(48px, 8vw, 112px);  font-weight: 500;
  letter-spacing: -0.035em;
  line-height: 0.96;
  max-width: 1100px;
  text-wrap: balance;
}
@media (min-width: 1200px) {
  .hero-title { max-width: min(1100px, calc(100vw - 480px)); }
  .hero-sub { max-width: min(620px, calc(100vw - 480px)); }
  .hero-ctas { max-width: calc(100vw - 480px); flex-wrap: wrap; }
}
.hero-title .hl {
  font-style: italic;
  font-weight: 400;
  background: linear-gradient(120deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  position: relative;
}
.hero-title .hl::after {
  content: "";
  position: absolute;
  left: 0; bottom: 0.04em;
  width: 100%; height: 8%;
  background: var(--accent);
  opacity: 0.25;
  filter: blur(12px);
}
.hero-sub {
  font-size: 19px;
  color: var(--text-dim);
  max-width: 620px;
  line-height: 1.6;
}
.hero-ctas { display: flex; gap: 14px; flex-wrap: wrap; }
.hero-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-top: 40px;
}
.hero-stat {
  padding: 28px 0;
  background: var(--bg);
}
.hero-stat-num {
  font-family: var(--display);
  font-size: 48px;
  font-weight: 500;
  line-height: 1;
  letter-spacing: -0.02em;
  background: linear-gradient(180deg, var(--text) 60%, var(--accent) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.hero-stat-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-top: 8px;
}

/* Hero decorative frame */
.hero-frame {
  position: absolute;
  top: 140px; right: 32px;
  width: 380px; height: 520px;
  pointer-events: none;
  opacity: 0.9;
  display: none;
}
@media (min-width: 1200px) { .hero-frame { display: block; } }
.hero-frame::before, .hero-frame::after {
  content: "";
  position: absolute;
  width: 24px; height: 24px;
  border: 1.5px solid var(--accent);
  box-shadow: 0 0 10px var(--glow);
}
.hero-frame::before { top: 0; right: 0; border-left: none; border-bottom: none; }
.hero-frame::after { bottom: 0; left: 0; border-right: none; border-top: none; }
.hero-terminal {
  position: absolute;
  inset: 40px 20px;
  background: linear-gradient(180deg, rgba(15, 23, 42, 0.8), rgba(17, 27, 48, 0.4));
  border: 1px solid var(--border-strong);
  backdrop-filter: blur(10px);
  padding: 20px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  overflow: hidden;
}
.hero-terminal-header {
  display: flex; gap: 6px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.hero-terminal-header span {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(148, 197, 255, 0.15);
}
.hero-terminal-header span:nth-child(1) { background: oklch(0.7 0.18 25); }
.hero-terminal-header span:nth-child(2) { background: oklch(0.8 0.18 85); }
.hero-terminal-header span:nth-child(3) { background: var(--accent); }
.hero-terminal pre {
  font-family: var(--mono);
  line-height: 1.7;
  white-space: pre-wrap;
}
.hero-terminal .tkey { color: var(--accent-2); }
.hero-terminal .tstr { color: var(--accent); }
.hero-terminal .tnum { color: oklch(0.82 0.14 50); }
.hero-terminal .tcom { color: var(--text-muted); }
.hero-terminal .tcur {
  display: inline-block;
  width: 8px; height: 14px;
  background: var(--accent);
  vertical-align: middle;
  margin-left: 2px;
  animation: blink 1s steps(2) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ---- games ---- */
.games-head {
  display: flex; justify-content: space-between; align-items: end;
  flex-wrap: wrap; gap: 24px;
  margin-bottom: 48px;
}

.featured-card {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 0;
  margin-bottom: 32px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--panel);
  position: relative;
  transition: border-color .3s, transform .3s;
}
.featured-card:hover { border-color: var(--accent); transform: translateY(-3px); }
.featured-card::before {
  content: "";
  position: absolute;
  inset: -1px;
  background: linear-gradient(135deg, var(--accent), transparent 40%, var(--accent-2));
  border-radius: var(--radius-lg);
  opacity: 0;
  z-index: -1;
  transition: opacity .3s;
  filter: blur(20px);
}
.featured-card:hover::before { opacity: 0.5; }
@media (max-width: 900px) {
  .featured-card { grid-template-columns: 1fr; }
}

.featured-art {
  aspect-ratio: 16 / 11;
  position: relative;
  overflow: hidden;
  background: var(--bg-2);
}
.featured-body {
  padding: 48px;
  display: flex; flex-direction: column;
  justify-content: space-between;
  gap: 32px;
}
.featured-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.18em;
  padding: 6px 12px;
  background: rgba(47, 226, 168, 0.12);
  color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: 100px;
  width: fit-content;
}
.featured-badge .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
.featured-title {
  font-family: var(--display);
  font-size: clamp(32px, 4vw, 48px);
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-top: 20px;
}
.featured-tag {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--accent-2);
  margin-top: 10px;
  letter-spacing: 0.05em;
}
.featured-desc {
  color: var(--text-dim);
  font-size: 15px;
  margin-top: 18px;
  line-height: 1.65;
  max-width: 460px;
}
.featured-ctas { display: flex; gap: 12px; flex-wrap: wrap; }

.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 24px;
}
.game-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: all .3s;
  display: flex; flex-direction: column;
  position: relative;
}
.game-card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: var(--radius-lg);
  padding: 1px;
  background: linear-gradient(135deg, transparent, var(--accent) 50%, transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
}
.game-card:hover { transform: translateY(-4px); border-color: transparent; }
.game-card:hover::after { opacity: 1; }
.game-card:hover .game-art::before { opacity: 0.6; }
.game-art {
  aspect-ratio: 16 / 10;
  position: relative;
  overflow: hidden;
  background: var(--bg-2);
}
.game-art::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 40%, var(--bg) 100%);
  z-index: 2;
  opacity: 0.4;
  transition: opacity .3s;
}
.game-status {
  position: absolute;
  top: 14px; left: 14px;
  z-index: 3;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  padding: 5px 10px;
  border-radius: 100px;
  background: rgba(7, 11, 20, 0.8);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border-strong);
  display: inline-flex; align-items: center; gap: 6px;
}
.game-status .dot {
  width: 5px; height: 5px; border-radius: 50%;
}
.game-status.live .dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.game-status.live { color: var(--accent); border-color: var(--accent); }
.game-status.soon .dot { background: var(--accent-2); box-shadow: 0 0 6px var(--accent-2); }
.game-status.soon { color: var(--accent-2); border-color: var(--accent-2); }
.game-status.classic .dot { background: var(--text-muted); }
.game-status.classic { color: var(--text-muted); }

.game-year {
  position: absolute;
  bottom: 14px; right: 14px;
  z-index: 3;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  letter-spacing: 0.1em;
  opacity: 0.7;
}
.game-body {
  padding: 20px;
  display: flex; flex-direction: column; gap: 6px;
}
.game-title {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.game-genre {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.engine-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 8px;
  border-radius: 3px;
  background: linear-gradient(135deg, oklch(0.55 0.2 300 / 0.18), oklch(0.62 0.18 260 / 0.12));
  border: 1px solid oklch(0.62 0.18 280 / 0.35);
  color: oklch(0.85 0.14 290);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 600;
}
.news-image {
  margin: -32px -32px 20px;
  height: 180px;
  overflow: hidden;
  position: relative;
  border-radius: 6px 6px 0 0;
  border-bottom: 1px solid var(--border);
}
.news-image img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.4s ease;
}
.news-card:hover .news-image img { transform: scale(1.05); }

/* placeholder art */
.ph-art {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  overflow: hidden;
}
.ph-art .bg {
  position: absolute; inset: 0;
  opacity: 0.9;
}
.ph-art .stripes {
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    45deg,
    rgba(255,255,255,0.025) 0 2px,
    transparent 2px 10px
  );
}
.ph-art .label {
  position: relative; z-index: 2;
  font-family: var(--display);
  font-weight: 600;
  font-size: 28px;
  letter-spacing: -0.01em;
  color: rgba(255,255,255,0.92);
  text-align: center;
  text-shadow: 0 2px 20px rgba(0,0,0,0.6);
  padding: 0 20px;
  text-transform: uppercase;
  font-style: italic;
}
.ph-art .sublabel {
  position: relative; z-index: 2;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.6);
  margin-top: 8px;
  text-transform: uppercase;
}

/* ---- team ---- */
.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  gap: 24px;
  margin-top: 56px;
}
.team-card {
  background: var(--panel);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  padding: 40px;
  position: relative;
  overflow: hidden;
  transition: all .3s;
}
.team-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 40%; height: 1px;
  background: linear-gradient(90deg, var(--accent), transparent);
}
.team-card:hover { border-color: var(--accent); transform: translateY(-3px); }
.team-head {
  display: flex; align-items: center; gap: 20px;
  margin-bottom: 24px;
}
.team-avatar {
  width: 88px; height: 88px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  padding: 3px;
  background: var(--bg);
  box-shadow: 0 0 20px var(--glow);
  position: relative;
}
.team-avatar img {
  width: 100%; height: 100%;
  border-radius: 50%;
  object-fit: cover;
}
.team-avatar::before {
  content: "";
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1px dashed var(--accent);
  opacity: 0.3;
  animation: spin 20s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.team-name {
  font-family: var(--display);
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.015em;
}
.team-role {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--accent);
  text-transform: uppercase;
  margin-top: 4px;
}
.team-body { color: var(--text-dim); line-height: 1.7; font-size: 15px; margin-bottom: 24px; }
.team-specs {
  display: grid; gap: 10px;
  padding: 20px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 12px;
  margin-bottom: 20px;
}
.team-spec { display: flex; justify-content: space-between; gap: 12px; }
.team-spec .k { color: var(--text-muted); letter-spacing: 0.08em; }
.team-spec .v { color: var(--text); text-align: right; }
.team-setup {
  margin-bottom: 16px;
  padding: 14px 16px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.team-setup-label {
  font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.team-setup-list { display: flex; flex-direction: column; gap: 6px; }
.team-setup-row {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono); font-size: 11px;
}
.team-setup-row .k { color: var(--text-muted); letter-spacing: 0.08em; }
.team-setup-row .v { color: var(--text); }
.focus-chip {
  font-family: var(--mono);
  font-size: 9px; letter-spacing: 0.08em;
  padding: 2px 7px; border-radius: 3px;
  background: oklch(0.5 0.12 220 / 0.12);
  border: 1px solid oklch(0.5 0.12 220 / 0.35);
  color: var(--accent-2);
}
.team-projects {
  margin-bottom: 16px;
}
.team-projects-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.team-projects-chips {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.proj-chip {
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 3px;
  border: 1px solid oklch(0.55 0.14 var(--chip-hue, 165) / 0.5);
  background: oklch(0.55 0.14 var(--chip-hue, 165) / 0.1);
  color: oklch(0.78 0.12 var(--chip-hue, 165));
  text-decoration: none;
  transition: background .15s, border-color .15s;
}
.proj-chip:hover {
  background: oklch(0.55 0.14 var(--chip-hue, 165) / 0.22);
  border-color: oklch(0.55 0.14 var(--chip-hue, 165) / 0.8);
}
.team-links {
  display: flex; flex-wrap: wrap; gap: 10px;
}
.team-links-label {
  width: 100%;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-bottom: 2px;
}
.team-link {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono);
  font-size: 12px;
  padding: 10px 14px;
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  color: var(--text-dim);
  transition: all .2s;
  letter-spacing: 0.05em;
}
.team-link:hover { color: var(--accent); border-color: var(--accent); }

/* ---- goals ---- */
.goals-layout {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 80px;
  align-items: start;
  margin-top: 56px;
}
@media (max-width: 900px) { .goals-layout { grid-template-columns: 1fr; gap: 48px; } }
.goals-body { color: var(--text-dim); font-size: 17px; line-height: 1.7; }
.goals-pillars { display: grid; gap: 16px; }
.pillar {
  padding: 24px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-left: 2px solid var(--accent);
  border-radius: 4px;
  transition: all .3s;
}
.pillar:hover {
  border-left-width: 4px;
  padding-left: 26px;
  background: var(--panel-2);
}
.pillar-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.15em;
  margin-bottom: 8px;
}
.pillar-title {
  font-family: var(--display);
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.pillar-body { color: var(--text-dim); font-size: 14px; line-height: 1.6; }

/* ---- news ---- */
.news-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  margin-top: 56px;
}
.news-card {
  padding: 32px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  transition: all .3s;
  display: flex; flex-direction: column;
  gap: 16px;
  position: relative;
}
.news-card:hover { border-color: var(--accent-2); transform: translateY(-3px); background: var(--panel-2); }
.news-meta {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--text-muted);
}
.news-tag {
  padding: 4px 8px;
  background: rgba(108, 211, 255, 0.08);
  color: var(--accent-2);
  border-radius: 3px;
}
.news-title {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.2;
}
.news-body { color: var(--text-dim); font-size: 14px; line-height: 1.65; }
.news-read {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 0.08em;
  margin-top: auto;
  display: inline-flex; align-items: center; gap: 6px;
  cursor: pointer;
}
.news-read:hover { gap: 10px; }

/* ---- community ---- */
.community {
  padding: 120px 0;
  position: relative;
  overflow: hidden;
}
.community-panel {
  position: relative;
  padding: 80px;
  background:
    radial-gradient(600px 300px at 20% 0%, oklch(0.82 0.16 165 / 0.15), transparent 70%),
    radial-gradient(600px 300px at 100% 100%, oklch(0.82 0.14 220 / 0.12), transparent 70%),
    var(--panel);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  display: grid;
  grid-template-columns: 1.3fr 1fr;
  gap: 60px;
  align-items: center;
}
.community-panel::before, .community-panel::after {
  content: "";
  position: absolute;
  width: 32px; height: 32px;
  border: 1.5px solid var(--accent);
}
.community-panel::before { top: -1px; left: -1px; border-right: none; border-bottom: none; box-shadow: -4px -4px 18px var(--glow); }
.community-panel::after { bottom: -1px; right: -1px; border-left: none; border-top: none; box-shadow: 4px 4px 18px var(--glow); }
@media (max-width: 900px) {
  .community-panel { grid-template-columns: 1fr; padding: 48px 32px; gap: 40px; }
}
.community-body { color: var(--text-dim); font-size: 17px; line-height: 1.7; margin: 20px 0 32px; }
.community-stats {
  display: grid; gap: 20px;
  font-family: var(--mono);
}
.community-stat {
  padding: 20px;
  background: rgba(7, 11, 20, 0.6);
  border: 1px solid var(--border-strong);
  border-radius: 8px;
}
.community-stat-num {
  font-family: var(--display);
  font-size: 56px;
  font-weight: 500;
  color: var(--accent);
  line-height: 1;
  letter-spacing: -0.03em;
  text-shadow: 0 0 30px var(--glow);
}
.community-stat-label {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 10px;
}

/* ---- contact ---- */
.contact-layout {
  display: grid;
  grid-template-columns: 1fr 1.3fr;
  gap: 80px;
  align-items: start;
  margin-top: 56px;
}
@media (max-width: 900px) { .contact-layout { grid-template-columns: 1fr; gap: 48px; } }
.contact-form { display: grid; gap: 20px; }
.field { display: grid; gap: 8px; }
.field label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.field input, .field textarea {
  background: var(--panel);
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  padding: 14px 16px;
  color: var(--text);
  font-family: var(--body);
  font-size: 15px;
  resize: vertical;
  transition: all .2s;
}
.field input:focus, .field textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--glow);
  background: var(--panel-2);
}
.contact-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 600px) { .contact-row { grid-template-columns: 1fr; } }

.contact-submit {
  margin-top: 8px;
  justify-self: start;
}

/* ---- footer ---- */
.footer {
  padding: 60px 0 30px;
  border-top: 1px solid var(--border);
  margin-top: 80px;
}
.footer-inner {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr;
  gap: 60px;
  padding-bottom: 40px;
}
@media (max-width: 700px) { .footer-inner { grid-template-columns: 1fr; gap: 32px; } }
.footer-brand { max-width: 320px; }
.footer-brand .logo { margin-bottom: 16px; }
.footer-brand p { color: var(--text-dim); font-size: 14px; line-height: 1.6; }
.footer-col h4 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.footer-col a {
  display: block;
  color: var(--text-dim);
  font-size: 14px;
  padding: 6px 0;
  transition: color .2s;
}
.footer-col a:hover { color: var(--accent); }
.footer-bottom {
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px;
  padding-top: 30px;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
}

/* ---- modal ---- */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(7, 11, 20, 0.8);
  backdrop-filter: blur(10px);
  z-index: 100;
  display: grid; place-items: center;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.modal-backdrop.open { opacity: 1; pointer-events: auto; }
.modal {
  width: 100%;
  max-width: 880px;
  background: var(--panel);
  border: 1px solid var(--accent);
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 80px var(--glow), 0 40px 100px rgba(0,0,0,0.6);
  transform: scale(0.96);
  transition: transform .25s;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-backdrop.open .modal { transform: scale(1); }
.modal-art {
  aspect-ratio: 16/8;
  position: relative;
  overflow: hidden;
}
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  z-index: 10;
  width: 38px; height: 38px;
  display: grid; place-items: center;
  background: rgba(7, 11, 20, 0.8);
  border: 1px solid var(--border-strong);
  border-radius: 50%;
  color: var(--text);
  font-size: 16px;
  backdrop-filter: blur(8px);
  transition: all .2s;
}
.modal-close:hover { border-color: var(--accent); color: var(--accent); transform: rotate(90deg); }
.modal-body { padding: 40px; }
.modal-title {
  font-family: var(--display);
  font-size: 40px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1;
}
.modal-tag {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--accent-2);
  margin-top: 8px;
}
.modal-desc {
  color: var(--text-dim);
  font-size: 16px;
  line-height: 1.7;
  margin: 24px 0 32px;
}
.modal-specs {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: 28px;
}
.modal-spec {
  padding: 16px 20px;
  background: var(--panel-2);
  font-family: var(--mono);
  font-size: 12px;
}
.modal-spec .k {
  color: var(--text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-size: 10px;
  margin-bottom: 6px;
}
.modal-spec .v { color: var(--text); font-size: 13px; }
.modal-actions { display: flex; gap: 12px; flex-wrap: wrap; }

/* ---- game modal carousel ---- */
.modal-carousel {
  aspect-ratio: 16/8;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}
.carousel-img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity .2s;
}
.carousel-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 42px; height: 42px;
  background: rgba(7, 11, 20, 0.75);
  border: 1px solid var(--border-strong);
  border-radius: 50%;
  color: var(--text);
  font-size: 22px;
  display: grid; place-items: center;
  backdrop-filter: blur(6px);
  transition: all .2s;
  z-index: 5;
}
.carousel-btn:hover { border-color: var(--accent); color: var(--accent); }
.carousel-prev { left: 16px; }
.carousel-next { right: 16px; }
.carousel-dots {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; align-items: center;
  z-index: 5;
}
.carousel-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.25);
  border: none; cursor: pointer; padding: 0;
  transition: background .2s, transform .2s;
}
.carousel-dot.active {
  background: var(--accent);
  transform: scale(1.4);
}
/* ---- modal devlogs section ---- */
.modal-devlogs {
  margin-top: 36px;
  border-top: 1px solid var(--border);
  padding-top: 28px;
}
.modal-devlogs-title {
  font-family: var(--mono);
  font-size: 11px; letter-spacing: 0.15em;
  color: var(--text-muted);
  margin-bottom: 16px;
}
.modal-devlogs-list {
  display: flex; flex-direction: column; gap: 10px;
}
.modal-devlog-item {
  padding: 16px 20px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color .2s;
}
.modal-devlog-item:hover { border-color: var(--accent); }
.modal-devlog-meta {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  font-family: var(--mono); font-size: 10px;
  color: var(--text-muted); letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.modal-devlog-title {
  font-weight: 600; font-size: 14px; color: var(--text);
  margin-bottom: 4px;
}
.modal-devlog-body {
  font-size: 13px; color: var(--text-dim); line-height: 1.5;
  margin: 0;
}
/* ---- news game badge ---- */
.news-game-badge {
  display: inline-block;
  font-family: var(--mono); font-size: 9px;
  padding: 2px 7px; border-radius: 3px;
  background: oklch(0.5 0.14 165 / 0.12);
  border: 1px solid oklch(0.5 0.14 165 / 0.35);
  color: var(--accent);
  letter-spacing: 0.08em; text-transform: uppercase;
}

/* ---- tweaks panel ---- */
.tweaks-panel {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 320px;
  background: var(--panel);
  border: 1px solid var(--accent);
  border-radius: var(--radius-lg);
  padding: 20px;
  z-index: 80;
  box-shadow: 0 10px 60px rgba(0,0,0,0.5), 0 0 30px var(--glow);
  transform: translateY(calc(100% + 40px));
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
  font-family: var(--mono);
}
.tweaks-panel.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
.tweaks-panel h3 {
  font-family: var(--display);
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  display: flex; justify-content: space-between; align-items: center;
}
.tweaks-panel > p {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 18px;
}
.tweak-row { margin-bottom: 16px; }
.tweak-row > label {
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  text-transform: uppercase;
  display: block;
  margin-bottom: 8px;
}
.tweak-options { display: flex; gap: 6px; flex-wrap: wrap; }
.tweak-opt {
  flex: 1;
  padding: 8px 10px;
  background: var(--bg-2);
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all .15s;
  text-align: center;
  letter-spacing: 0.05em;
}
.tweak-opt:hover { color: var(--text); border-color: var(--text-dim); }
.tweak-opt.active { background: var(--accent); color: #041812; border-color: var(--accent); font-weight: 600; }
.tweak-swatches { display: flex; gap: 8px; }
.tweak-swatch {
  flex: 1;
  aspect-ratio: 1;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all .15s;
  position: relative;
}
.tweak-swatch.active { border-color: white; box-shadow: 0 0 16px currentColor; }

/* --- layout variant: centered hero */
body[data-hero="centered"] .hero-inner { text-align: center; justify-items: center; }
body[data-hero="centered"] .hero-frame { display: none; }
body[data-hero="centered"] .hero-title, body[data-hero="centered"] .hero-sub { margin-left: auto; margin-right: auto; }
body[data-hero="centered"] .hero-ctas { justify-content: center; }

/* --- background variant */
body[data-bg="dots"] .grid-bg {
  background-image: radial-gradient(circle, rgba(148, 197, 255, 0.1) 1px, transparent 1px);
  background-size: 28px 28px;
}
body[data-bg="lines"] .grid-bg {
  background-image: repeating-linear-gradient(
    0deg,
    rgba(148, 197, 255, 0.04) 0 1px,
    transparent 1px 80px
  );
}
body[data-bg="none"] .grid-bg { display: none; }

/* --- card style variant */
body[data-cards="sharp"] .game-card, body[data-cards="sharp"] .featured-card { border-radius: 2px; }
body[data-cards="sharp"] .news-card { border-radius: 2px; }

/* Animations on scroll */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity .8s ease, transform .8s ease; }
.reveal.shown { opacity: 1; transform: translateY(0); }

/* Corner ticks for sections */
.section-head { position: relative; }
.section-head::before {
  content: "";
  position: absolute;
  left: -24px; top: 8px;
  width: 12px; height: 12px;
  border-left: 1px solid var(--accent);
  border-top: 1px solid var(--accent);
}

/* utility */
.flex { display: flex; }
.hidden { display: none !important; }

/* ---- engine tags ---- */
.etag {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  letter-spacing: 0.12em; padding: 3px 8px; border-radius: 3px;
  text-transform: uppercase; white-space: nowrap;
}
.etag-roblox { background: oklch(0.82 0.16 165 / 0.14); border: 1px solid oklch(0.82 0.16 165 / 0.4); color: var(--accent); }
.etag-ue5    { background: oklch(0.55 0.2 300 / 0.15);  border: 1px solid oklch(0.62 0.18 280 / 0.45); color: oklch(0.85 0.14 290); }
.etag-unity  { background: oklch(0.82 0.14 220 / 0.12); border: 1px solid oklch(0.82 0.14 220 / 0.35); color: var(--accent-2); }
.etag-godot  { background: oklch(0.55 0.18 250 / 0.15); border: 1px solid oklch(0.6 0.16 250 / 0.4);  color: oklch(0.78 0.15 250); }
.etag-custom { background: var(--bg-2); border: 1px solid var(--border-strong); color: var(--text-muted); }

/* engine tag in art overlay */
.game-engine-overlay {
  position: absolute; top: 14px; right: 14px;
  z-index: 3;
}

/* ---- platform badges ---- */
.platform-badges {
  display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px;
}
.featured-meta-row {
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-top: 10px;
}
.featured-meta-row .platform-badges { margin-top: 0; }
.pbadge {
  display: inline-flex; align-items: center; gap: 3px;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
  padding: 3px 7px; border-radius: 3px;
  background: var(--bg-2); border: 1px solid var(--border-strong);
  color: var(--text-muted); text-transform: uppercase;
}
.pbadge svg { opacity: 0.8; }

/* admin platform checkboxes */
.platform-checks {
  display: flex; gap: 14px; flex-wrap: wrap;
  padding: 10px 12px;
  background: var(--panel); border: 1px solid var(--border-strong); border-radius: 4px;
}
.platform-check-item {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 11px; color: var(--text-dim);
  cursor: pointer; user-select: none;
}
.platform-check-item input { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; }

/* responsive */
@media (max-width: 800px) {
  .nav-links { display: none; }
  section { padding: 80px 0; }
  .hero { padding: 140px 0 60px; }
  .container { padding: 0 20px; }
  .featured-body { padding: 32px 24px; }
  .community-panel { padding: 48px 24px; }
  .team-card { padding: 32px 24px; }
}

/* ---- Roblox Community ---- */
.rblx-community {
  padding-top: 0;
  margin-top: -40px;
}
.rblx-card {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 0;
  background: var(--panel);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-top: 40px;
  position: relative;
  transition: all .3s;
}
.rblx-card:hover { border-color: var(--accent-2); transform: translateY(-3px); }
@media (max-width: 800px) { .rblx-card { grid-template-columns: 1fr; } }
.rblx-visual {
  position: relative;
  background:
    radial-gradient(ellipse at 30% 30%, oklch(0.5 0.18 165 / 0.6), transparent 70%),
    radial-gradient(ellipse at 70% 70%, oklch(0.45 0.16 220 / 0.5), transparent 70%),
    linear-gradient(135deg, #0a1a2a, #0a2420);
  display: grid;
  place-items: center;
  padding: 40px;
  min-height: 260px;
  overflow: hidden;
}
.rblx-visual::before {
  content: "";
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 10px);
}
.rblx-mark {
  width: 128px; height: 128px;
  border-radius: 26px;
  background: #000;
  display: grid; place-items: center;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px var(--glow);
  border: 2px solid var(--accent);
}
.rblx-mark span {
  font-family: var(--display);
  font-size: 72px;
  font-weight: 700;
  line-height: 1;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  transform: translateY(-2px);
}
.rblx-body {
  padding: 36px 40px;
  display: flex; flex-direction: column; gap: 18px;
}
.rblx-tag {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.18em;
  display: inline-flex; align-items: center; gap: 8px;
}
.rblx-tag::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 8px var(--accent);
}
.rblx-name {
  font-family: var(--display);
  font-size: 32px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.rblx-sub { color: var(--text-dim); font-size: 15px; line-height: 1.6; max-width: 500px; }
.rblx-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-top: 4px;
  border-radius: 6px;
  overflow: hidden;
}
.rblx-stat {
  padding: 14px 18px;
  background: var(--bg-2);
  font-family: var(--mono);
}
.rblx-stat-num {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.01em;
}
.rblx-stat-label {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 4px;
}
.rblx-cta { margin-top: 6px; }

/* ---- Unreal Engine 5 teaser ---- */
.unreal {
  padding: 80px 0;
}
.unreal-card {
  position: relative;
  overflow: hidden;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-strong);
  background: #05070c;
  padding: 60px;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 60px;
  align-items: center;
}
@media (max-width: 900px) {
  .unreal-card { grid-template-columns: 1fr; padding: 40px 28px; gap: 32px; }
}
.unreal-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(700px 400px at 85% 15%, oklch(0.5 0.18 280 / 0.3), transparent 70%),
    radial-gradient(500px 300px at 15% 100%, oklch(0.5 0.2 25 / 0.2), transparent 70%);
  pointer-events: none;
}
.unreal-card::after {
  content: "";
  position: absolute; inset: 0;
  background-image:
    linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  pointer-events: none;
}
.unreal-content { position: relative; z-index: 2; }
.unreal-kicker {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  border: 1px solid oklch(0.5 0.18 280);
  color: oklch(0.85 0.15 280);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  border-radius: 100px;
  background: oklch(0.5 0.18 280 / 0.1);
  width: fit-content;
}
.unreal-kicker .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: oklch(0.85 0.15 280);
  box-shadow: 0 0 8px oklch(0.85 0.15 280);
  animation: pulse 2s ease-in-out infinite;
}
.unreal-title {
  font-family: var(--display);
  font-size: clamp(32px, 4.5vw, 56px);
  font-weight: 500;
  letter-spacing: -0.025em;
  line-height: 1;
  margin-top: 18px;
  text-wrap: balance;
}
.unreal-body {
  color: var(--text-dim);
  font-size: 17px;
  line-height: 1.65;
  margin: 22px 0 28px;
  max-width: 540px;
}
.unreal-meta {
  display: flex; gap: 40px; flex-wrap: wrap;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 12px;
}
.unreal-meta-item .k {
  color: var(--text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-size: 10px;
  margin-bottom: 4px;
}
.unreal-meta-item .v { color: var(--text); }
.ue5-visual {
  position: relative;
  z-index: 2;
  aspect-ratio: 4 / 5;
  display: grid;
  place-items: center;
  background:
    radial-gradient(ellipse at center, oklch(0.5 0.18 280 / 0.5), transparent 70%),
    #000;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border-strong);
}
.ue5-visual::before {
  content: "";
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 8px);
  animation: scan 8s linear infinite;
}
@keyframes scan { from { background-position: 0 0; } to { background-position: 0 100%; } }
.ue5-logo {
  position: relative; z-index: 2;
  text-align: center;
  font-family: var(--display);
  color: white;
  letter-spacing: -0.04em;
}
.ue5-logo .big {
  font-size: 120px;
  font-weight: 700;
  line-height: 0.85;
  background: linear-gradient(135deg, #fff 20%, oklch(0.7 0.18 280));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 60px oklch(0.5 0.18 280 / 0.5);
}
.ue5-logo .sub {
  font-family: var(--mono);
  font-size: 11px;
  color: oklch(0.85 0.15 280);
  letter-spacing: 0.25em;
  margin-top: 8px;
  text-transform: uppercase;
}
.ue5-corners::before, .ue5-corners::after {
  content: "";
  position: absolute;
  width: 20px; height: 20px;
  border: 1.5px solid oklch(0.85 0.15 280);
}
.ue5-corners::before { top: 12px; left: 12px; border-right: none; border-bottom: none; }
.ue5-corners::after { bottom: 12px; right: 12px; border-left: none; border-top: none; }

/* ── Roblox live player count badges ──────────────────────────────── */
.game-playing-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 6px #22c55e;
  animation: pulse-green 2s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulse-green {
  0%, 100% { opacity: 1; box-shadow: 0 0 6px #22c55e; }
  50%       { opacity: 0.6; box-shadow: 0 0 12px #22c55e; }
}

/* Badge over grid card thumbnail */
.game-playing-badge {
  position: absolute;
  bottom: 8px; left: 8px;
  z-index: 3;
  display: flex; align-items: center; gap: 5px;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(6px);
  border: 1px solid rgba(34,197,94,0.3);
  border-radius: 20px;
  padding: 3px 9px 3px 7px;
  font-family: var(--mono);
  font-size: 11px;
  color: #86efac;
  font-weight: 700;
  letter-spacing: 0.04em;
  pointer-events: none;
}

/* Badge on featured card */
.featured-playing {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(34,197,94,0.08);
  border: 1px solid rgba(34,197,94,0.25);
  border-radius: 20px;
  padding: 4px 12px 4px 10px;
  font-family: var(--mono);
  font-size: 12px;
  color: #86efac;
  font-weight: 700;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

  "Unreal Engine 5": "etag-ue5",
  "Unreal Engine 4": "etag-ue5",
  "Unity": "etag-unity",
  "Godot": "etag-godot",
  "Custom": "etag-custom",
};
const ENGINE_LABEL = {
  "Roblox": "Roblox",
  "Unreal Engine 5": "UE5",
  "Unreal Engine 4": "UE4",
  "Unity": "Unity",
  "Godot": "Godot",
  "Custom": "Custom",
};
const EngineTag = ({ engine }) => {
  const e = engine || "Roblox";
  return <span className={`etag ${ETAG_CLASS[e] || "etag-custom"}`}>{ENGINE_LABEL[e] || e}</span>;
};

  Xbox: <svg viewBox="0 0 14 14" width="10" height="10" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="7" cy="7" r="5.5"/><path d="M4 5l6 4M10 5l-6 4"/></svg>,
  PlayStation: <svg viewBox="0 0 14 14" width="10" height="10" fill="currentColor"><path d="M5.2 2v9.1l2 .9V4c0-.4.2-.6.5-.5.4.1.5.5.5 1v3.1c1.2.5 2.1 0 2.1-1.5 0-1.6-.7-2.4-2.1-2.9L5.2 2zM1 10.2l2.5.8V9.4L1 8.6v1.6zm10.5-1.3c-1-.4-2.2-.5-3.2-.2v1.2l2 .7c.4.1.5.4.2.6-.3.2-.8.1-1.2 0L7 10.6v1.2c.5.2 1 .3 1.5.3.8 0 1.6-.2 2-.6.6-.5.5-1.2 0-1.6z"/></svg>,
  Browser: <svg viewBox="0 0 14 14" width="10" height="10" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="7" cy="7" r="5.5"/><path d="M1.5 7h11M7 1.5a8 8 0 010 11M7 1.5a8 8 0 000 11"/></svg>,
};
const PlatformBadges = ({ platforms }) => {
  const known = (platforms || []).filter(p => p in PLATFORM_ICONS);
  if (known.length === 0) return null;
  return (
    <div className="platform-badges">
      {known.map(p => (
        <span key={p} className="pbadge" title={p}>
          {PLATFORM_ICONS[p]}{p}
        </span>
      ))}
    </div>
  );
};

const genreLabel = (game, lang) => {
  const opts = window.GAME_GENRES || [];
  const ids = game.genres && game.genres.length > 0 ? game.genres : null;
  if (ids) return ids.map(id => { const o = opts.find(g => g.id === id); return o ? (lang === "pt" ? o.pt : o.en) : id; }).join(" · ");
  return lang === "pt" ? (game.genre_pt || "") : (game.genre_en || game.genre_pt || "");
};

// Extract Roblox place ID from a game URL
const getPlaceId = (url) => (url || '').match(/roblox\.com\/games\/(\d+)/)?.[1];

const Games = ({ lang, onOpen, games, robloxStats = {} }) => {
  const t = window.OUTSIDE_I18N[lang];
  const featured = games.find((g) => g.featured);
  const others = games.filter((g) => !g.featured);

  return (
    <section id="games">
      <div className="container">
        <div className="games-head section-head">
          <div>
            <div className="kicker">{t.games_kicker}</div>
            <h2 className="section-title">{t.games_title}</h2>
            <p className="section-sub">{t.games_sub}</p>
          </div>
        </div>
        {featured && <FeaturedCard game={featured} lang={lang} onOpen={onOpen} stats={robloxStats[getPlaceId(featured.url)]} />}
        <div className="games-grid">
          {others.map((g) => (
            <GameCard key={g.id} game={g} lang={lang} onOpen={onOpen} stats={robloxStats[getPlaceId(g.url)]} />
          ))}
        </div>
      </div>
    </section>
  );
};

    return opt ? (lang === "pt" ? opt.pt : opt.en) : id;

  const projLabel = lang === "pt" ? "PROJETOS" : "PROJECTS";

const NewsModal = ({ item, lang, onClose }) => {
  const t = window.OUTSIDE_I18N[lang];
  useEffect(() => {
    const esc = (e) => e.key === "Escape" && onClose();
    document.addEventListener("keydown", esc);
    return () => document.removeEventListener("keydown", esc);
  }, [onClose]);
  if (!item) return <div className="modal-backdrop" />;
  const body = lang === "pt" ? (item.full_pt || item.body_pt) : (item.full_en || item.body_en);
  return (
    <div className="modal-backdrop open" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 720 }}>
        {item.image && (
          <div style={{ width: "100%", height: 280, overflow: "hidden", position: "relative", borderBottom: "1px solid var(--border)" }}>
            <img src={item.image} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }}
              onError={(e) => { e.target.parentElement.style.display = "none"; }} />
            <button className="modal-close" onClick={onClose} style={{ top: 16, right: 16, position: "absolute", zIndex: 3 }}>✕</button>
          </div>
        )}

const Carousel = ({ images, game, onClose }) => {
  const [idx, setIdx] = React.useState(0);
  React.useEffect(() => setIdx(0), [game && game.id]);
  const imgs = images && images.filter(x => x).length > 0 ? images.filter(x => x) : null;
  if (!imgs) {
    return (
      <div className="modal-art">
        <PlaceholderArt game={game} large />
        <button className="modal-close" onClick={onClose}>✕</button>
      </div>
    );
  }
  const prev = (e) => { e.stopPropagation(); setIdx((idx - 1 + imgs.length) % imgs.length); };
  const next = (e) => { e.stopPropagation(); setIdx((idx + 1) % imgs.length); };
  return (
    <div className="modal-carousel">
      <img key={idx} src={imgs[idx]} alt="" className="carousel-img" onError={(e) => { e.target.style.opacity = 0.15; }} />
      {imgs.length > 1 && (
        <>
          <button className="carousel-btn carousel-prev" onClick={prev}>‹</button>
          <button className="carousel-btn carousel-next" onClick={next}>›</button>
          <div className="carousel-dots">
            {imgs.map((_, i) => (
              <button key={i} className={`carousel-dot${i === idx ? " active" : ""}`} onClick={(e) => { e.stopPropagation(); setIdx(i); }} />
            ))}
          </div>
        </>
      )}
      <button className="modal-close" onClick={onClose}>✕</button>
    </div>
  );
};

// ----- App -----
const TWEAK_DEFAULTS = {
  accent: "emerald",
  hero: "default",
  bg: "grid",
  cards: "round"
};

const accentMap = {
  emerald: { a: "oklch(0.82 0.16 165)", a2: "oklch(0.82 0.14 220)", glow: "oklch(0.82 0.16 165 / 0.35)" },
  cyan: { a: "oklch(0.82 0.14 220)", a2: "oklch(0.82 0.16 165)", glow: "oklch(0.82 0.14 220 / 0.35)" },
  purple: { a: "oklch(0.72 0.2 300)", a2: "oklch(0.82 0.14 220)", glow: "oklch(0.72 0.2 300 / 0.35)" },
  orange: { a: "oklch(0.78 0.16 55)", a2: "oklch(0.82 0.14 220)", glow: "oklch(0.78 0.16 55 / 0.35)" },
  pink: { a: "oklch(0.75 0.2 0)", a2: "oklch(0.82 0.14 220)", glow: "oklch(0.75 0.2 0 / 0.35)" },
};

const App = () => {
  const [lang, setLangState] = useState(getLang());
  const [modalGame, setModalGame] = useState(null);
  const [modalNews, setModalNews] = useState(null);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState({ ...TWEAK_DEFAULTS });
  const [adminOpen, setAdminOpen] = useState(false);
  const [games, setGamesState] = useState(() => window.loadLS(window.LS_GAMES, window.OUTSIDE_GAMES.map(g => ({...g}))));
  const [devs, setDevsState] = useState(() => window.loadLS(window.LS_DEVS, window.DEFAULT_DEVS.map(d => ({...d}))));
  const [news, setNewsState] = useState(() => window.loadLS(window.LS_NEWS, window.OUTSIDE_NEWS.map(n => ({...n, id: n.id || Math.random().toString(36).slice(2,9)}))));
  const [robloxStats, setRobloxStats] = useState({});

  // Fetch player counts from stats.json (updated by GitHub Actions every ~15 min)
  useEffect(() => {
    fetch('./stats.json?_=' + Date.now())
      .then(r => r.json())
      .then(d => setRobloxStats(d.games || {}))
      .catch(() => {});
  }, []);

  const setGames = (g) => { setGamesState(g); window.saveLS(window.LS_GAMES, g); };
  const setDevs = (d) => { setDevsState(d); window.saveLS(window.LS_DEVS, d); };
  const setNews = (n) => { setNewsState(n); window.saveLS(window.LS_NEWS, n); };

  const setLang = (l) => {
    setLangLS(l);
    setLangState(l);
    document.documentElement.lang = l === "pt" ? "pt-BR" : "en";
  };

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
  };

  // apply tweaks
  useEffect(() => {
    document.body.dataset.hero = tweaks.hero;
    document.body.dataset.bg = tweaks.bg;
    document.body.dataset.cards = tweaks.cards;
    const a = accentMap[tweaks.accent] || accentMap.emerald;
    document.documentElement.style.setProperty("--accent", a.a);
    document.documentElement.style.setProperty("--accent-2", a.a2);
    document.documentElement.style.setProperty("--glow", a.glow);
  }, [tweaks]);

  // admin open: #admin hash or Ctrl+Shift+A (only when panel is available)
  useEffect(() => {
    if (!window.AdminPanel) return;
    const checkHash = () => { if (location.hash === "#admin") setAdminOpen(true); };
    checkHash();
    window.addEventListener("hashchange", checkHash);
    const key = (e) => {
      if (e.ctrlKey && e.shiftKey && (e.key === "A" || e.key === "a")) {
        e.preventDefault(); setAdminOpen(true);
      }
    };
    window.addEventListener("keydown", key);
    return () => { window.removeEventListener("hashchange", checkHash); window.removeEventListener("keydown", key); };
  }, []);

  // reveal on scroll
  useEffect(() => {
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((en) => {
          if (en.isIntersecting) en.target.classList.add("shown");
        });
      },
      { threshold: 0.1 }
    );
    document.querySelectorAll(".reveal").forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, [lang]);

  return (
    <>
      <div className="grid-bg" />
      <div className="noise" />
      <Nav lang={lang} setLang={setLang} />
      <main>
        <Hero lang={lang} />
        <Games lang={lang} onOpen={setModalGame} games={games} robloxStats={robloxStats} />
        <UnrealTeaser lang={lang} />
        <Team lang={lang} members={devs} games={games} />
        <Goals lang={lang} />
        <News lang={lang} items={news} onOpen={setModalNews} games={games} />
        <Community lang={lang} />
        <RobloxCommunity lang={lang} />
      </main>
      <Footer lang={lang} games={games} />
      <Modal game={modalGame} lang={lang} onClose={() => setModalGame(null)} allNews={news} onOpenNews={setModalNews} />
      {modalNews && <NewsModal item={modalNews} lang={lang} onClose={() => setModalNews(null)} />}
      <TweaksPanel open={tweaksOpen} tweaks={tweaks} setTweak={setTweak} />
      {window.AdminPanel && <window.AdminPanel
        open={adminOpen}
        onClose={() => setAdminOpen(false)}
        games={games} setGames={setGames}
        devs={devs} setDevs={setDevs}
        news={news} setNews={setNews}
        lang={lang}
      />}
      {window.AdminPanel && <button className="admin-fab" title="Admin (Ctrl+Shift+A)" onClick={() => setAdminOpen(true)}>◆</button>}
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
