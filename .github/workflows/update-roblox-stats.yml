name: Update Roblox Stats

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # allow manual trigger

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Roblox player counts
        run: |
          python3 - <<'EOF'
          import json, re, time, sys
          from datetime import datetime, timezone
          from urllib.request import urlopen, Request
          from urllib.error import URLError

          # Extract place IDs from index.html
          with open("index.html", "r", encoding="utf-8") as f:
              content = f.read()

          place_ids = list(set(re.findall(r'"url":\s*"https://www\.roblox\.com/games/(\d+)', content)))
          print(f"Place IDs found: {place_ids}")

          def fetch(url, timeout=10):
              try:
                  req = Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urlopen(req, timeout=timeout) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"  Request failed for {url}: {e}")
                  return {}

          games = {}
          for place_id in place_ids:
              print(f"--- Processing place {place_id} ---")

              # Step 1: place ID → universe ID
              data = fetch(f"https://apis.roblox.com/universes/v1/places/{place_id}/universe")
              universe_id = data.get("universeId")
              if not universe_id:
                  print(f"  No universe found, skipping")
                  time.sleep(0.5)
                  continue

              time.sleep(0.5)

              # Step 2: universe ID → playing / visits
              gdata = fetch(f"https://games.roblox.com/v1/games?universeIds={universe_id}")
              game_list = gdata.get("data", [])
              playing = game_list[0].get("playing", 0) if game_list else 0
              visits  = game_list[0].get("visits",  0) if game_list else 0

              print(f"  universeId={universe_id}  playing={playing}  visits={visits}")
              games[place_id] = {"playing": playing, "visits": visits}
              time.sleep(0.5)

          # Write stats.json
          timestamp = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          stats = {"updated": timestamp, "games": games}
          with open("stats.json", "w") as f:
              json.dump(stats, f)

          print("stats.json written:")
          print(json.dumps(stats, indent=2))
          EOF

      - name: Commit stats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update roblox stats [skip ci]"
            git pull --rebase origin main
            git push
          fi
