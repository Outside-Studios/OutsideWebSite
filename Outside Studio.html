<!doctype html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Outside Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
/* Outside Studio — Cyberpunk neon, emerald + cyan on midnight */
:root {
  --bg: #070b14;
  --bg-2: #0b1220;
  --panel: #0f172a;
  --panel-2: #111b30;
  --border: rgba(148, 197, 255, 0.08);
  --border-strong: rgba(148, 197, 255, 0.18);
  --text: #e6f1ff;
  --text-dim: #8ea3c4;
  --text-muted: #5b6f8f;
  --accent: oklch(0.82 0.16 165);   /* emerald */
  --accent-2: oklch(0.82 0.14 220); /* cyan */
  --accent-warm: oklch(0.78 0.15 55); /* warm accent for variety */
  --glow: oklch(0.82 0.16 165 / 0.35);
  --glow-2: oklch(0.82 0.14 220 / 0.35);
  --radius: 6px;
  --radius-lg: 14px;
  --mono: "JetBrains Mono", ui-monospace, monospace;
  --display: "Space Grotesk", "Inter", system-ui, sans-serif;
  --body: "Inter", system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: var(--body); -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body {
  min-height: 100vh;
  overflow-x: hidden;
  background:
    radial-gradient(1200px 600px at 10% -10%, oklch(0.82 0.16 165 / 0.08), transparent 60%),
    radial-gradient(1000px 500px at 100% 10%, oklch(0.82 0.14 220 / 0.07), transparent 60%),
    var(--bg);
}

/* ---- global ---- */
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
img { display: block; max-width: 100%; }
::selection { background: var(--accent); color: #031018; }

.container {
  width: 100%;
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
}

.kicker {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  color: var(--accent);
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.kicker::before {
  content: "";
  width: 28px; height: 1px;
  background: var(--accent);
  box-shadow: 0 0 10px var(--glow);
}

.section-title {
  font-family: var(--display);
  font-size: clamp(32px, 4.2vw, 56px);
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.05;
  margin-top: 16px;
  text-wrap: balance;
}
.section-sub {
  color: var(--text-dim);
  font-size: 17px;
  margin-top: 14px;
  max-width: 620px;
  line-height: 1.6;
}

section { padding: 120px 0; position: relative; }

/* ---- scanline grid bg ---- */
.grid-bg {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(to right, rgba(148, 197, 255, 0.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(148, 197, 255, 0.04) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
  pointer-events: none;
  z-index: 0;
}
.noise {
  position: fixed; inset: 0;
  pointer-events: none;
  opacity: 0.035;
  z-index: 1;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='1'/></svg>");
}

/* ---- nav ---- */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  backdrop-filter: blur(18px);
  background: rgba(7, 11, 20, 0.72);
  border-bottom: 1px solid var(--border);
  transition: background .3s;
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 32px;
  max-width: 1320px;
  margin: 0 auto;
}
.logo {
  display: flex; align-items: center; gap: 12px;
  font-family: var(--display);
  font-weight: 600;
  font-size: 18px;
  letter-spacing: -0.01em;
}
.logo-svg {
  filter: drop-shadow(0 0 8px var(--glow));
  transition: transform 0.4s ease, filter 0.4s ease;
}
.logo:hover .logo-svg {
  transform: rotate(15deg) scale(1.08);
  filter: drop-shadow(0 0 14px var(--glow));
}
.logo-mark {
  width: 32px; height: 32px;
  border: 1.5px solid var(--accent);
  position: relative;
  display: grid; place-items: center;
  box-shadow: 0 0 14px var(--glow), inset 0 0 14px var(--glow);
  background: var(--bg-2);
  transform: rotate(45deg);
}
.logo-mark::before {
  content: "";
  width: 10px; height: 10px;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
}
.logo-mark::after {
  content: "";
  position: absolute;
  inset: -4px;
  border: 1px solid var(--accent);
  opacity: 0.3;
}
.logo-text { font-weight: 600; }
.logo-text span { color: var(--accent); }

.nav-links {
  display: flex; gap: 4px;
  font-size: 14px;
  font-family: var(--mono);
}
.nav-links a {
  padding: 8px 14px;
  color: var(--text-dim);
  border-radius: 4px;
  transition: color .2s, background .2s;
  letter-spacing: 0.02em;
}
.nav-links a:hover { color: var(--text); background: rgba(148, 197, 255, 0.05); }

.nav-actions { display: flex; gap: 10px; align-items: center; }
.lang-toggle {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.1em;
  padding: 8px 12px;
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  color: var(--text-dim);
  transition: all .2s;
}
.lang-toggle:hover { color: var(--accent); border-color: var(--accent); }

/* ---- buttons ---- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-radius: 4px;
  transition: all .2s;
  position: relative;
  cursor: pointer;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  color: #041812;
  font-weight: 600;
  box-shadow: 0 0 0 0 var(--glow), 0 10px 40px -10px var(--glow);
}
.btn-primary:hover {
  box-shadow: 0 0 0 4px var(--glow), 0 16px 50px -6px var(--glow);
  transform: translateY(-1px);
}
.btn-ghost {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border-strong);
}
.btn-ghost:hover {
  border-color: var(--accent-2);
  color: var(--accent-2);
  background: rgba(108, 211, 255, 0.04);
}
.btn .arrow { transition: transform .2s; }
.btn:hover .arrow { transform: translateX(3px); }

/* ---- hero ---- */
.hero {
  padding: 180px 0 100px;
  position: relative;
  overflow: hidden;
}
.hero-inner { position: relative; z-index: 2; display: grid; gap: 40px; }
.hero-kicker {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.2em;
  color: var(--accent);
  padding: 8px 14px;
  border: 1px solid var(--accent);
  border-radius: 100px;
  background: rgba(47, 226, 168, 0.04);
  width: fit-content;
}
.hero-kicker .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.2); }
}
.hero-title {
  font-family: var(--display);
  font-size: clamp(48px, 8vw, 112px);  font-weight: 500;
  letter-spacing: -0.035em;
  line-height: 0.96;
  max-width: 1100px;
  text-wrap: balance;
}
@media (min-width: 1200px) {
  .hero-title { max-width: min(1100px, calc(100vw - 480px)); }
  .hero-sub { max-width: min(620px, calc(100vw - 480px)); }
  .hero-ctas { max-width: calc(100vw - 480px); flex-wrap: wrap; }
}
.hero-title .hl {
  font-style: italic;
  font-weight: 400;
  background: linear-gradient(120deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  position: relative;
}
.hero-title .hl::after {
  content: "";
  position: absolute;
  left: 0; bottom: 0.04em;
  width: 100%; height: 8%;
  background: var(--accent);
  opacity: 0.25;
  filter: blur(12px);
}
.hero-sub {
  font-size: 19px;
  color: var(--text-dim);
  max-width: 620px;
  line-height: 1.6;
}
.hero-ctas { display: flex; gap: 14px; flex-wrap: wrap; }
.hero-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-top: 40px;
}
.hero-stat {
  padding: 28px 0;
  background: var(--bg);
}
.hero-stat-num {
  font-family: var(--display);
  font-size: 48px;
  font-weight: 500;
  line-height: 1;
  letter-spacing: -0.02em;
  background: linear-gradient(180deg, var(--text) 60%, var(--accent) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.hero-stat-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-top: 8px;
}

/* Hero decorative frame */
.hero-frame {
  position: absolute;
  top: 140px; right: 32px;
  width: 380px; height: 520px;
  pointer-events: none;
  opacity: 0.9;
  display: none;
}
@media (min-width: 1200px) { .hero-frame { display: block; } }
.hero-frame::before, .hero-frame::after {
  content: "";
  position: absolute;
  width: 24px; height: 24px;
  border: 1.5px solid var(--accent);
  box-shadow: 0 0 10px var(--glow);
}
.hero-frame::before { top: 0; right: 0; border-left: none; border-bottom: none; }
.hero-frame::after { bottom: 0; left: 0; border-right: none; border-top: none; }
.hero-terminal {
  position: absolute;
  inset: 40px 20px;
  background: linear-gradient(180deg, rgba(15, 23, 42, 0.8), rgba(17, 27, 48, 0.4));
  border: 1px solid var(--border-strong);
  backdrop-filter: blur(10px);
  padding: 20px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  overflow: hidden;
}
.hero-terminal-header {
  display: flex; gap: 6px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.hero-terminal-header span {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(148, 197, 255, 0.15);
}
.hero-terminal-header span:nth-child(1) { background: oklch(0.7 0.18 25); }
.hero-terminal-header span:nth-child(2) { background: oklch(0.8 0.18 85); }
.hero-terminal-header span:nth-child(3) { background: var(--accent); }
.hero-terminal pre {
  font-family: var(--mono);
  line-height: 1.7;
  white-space: pre-wrap;
}
.hero-terminal .tkey { color: var(--accent-2); }
.hero-terminal .tstr { color: var(--accent); }
.hero-terminal .tnum { color: oklch(0.82 0.14 50); }
.hero-terminal .tcom { color: var(--text-muted); }
.hero-terminal .tcur {
  display: inline-block;
  width: 8px; height: 14px;
  background: var(--accent);
  vertical-align: middle;
  margin-left: 2px;
  animation: blink 1s steps(2) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ---- games ---- */
.games-head {
  display: flex; justify-content: space-between; align-items: end;
  flex-wrap: wrap; gap: 24px;
  margin-bottom: 48px;
}

.featured-card {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 0;
  margin-bottom: 32px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--panel);
  position: relative;
  transition: border-color .3s, transform .3s;
}
.featured-card:hover { border-color: var(--accent); transform: translateY(-3px); }
.featured-card::before {
  content: "";
  position: absolute;
  inset: -1px;
  background: linear-gradient(135deg, var(--accent), transparent 40%, var(--accent-2));
  border-radius: var(--radius-lg);
  opacity: 0;
  z-index: -1;
  transition: opacity .3s;
  filter: blur(20px);
}
.featured-card:hover::before { opacity: 0.5; }
@media (max-width: 900px) {
  .featured-card { grid-template-columns: 1fr; }
}

.featured-art {
  aspect-ratio: 16 / 11;
  position: relative;
  overflow: hidden;
  background: var(--bg-2);
}
.featured-body {
  padding: 48px;
  display: flex; flex-direction: column;
  justify-content: space-between;
  gap: 32px;
}
.featured-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.18em;
  padding: 6px 12px;
  background: rgba(47, 226, 168, 0.12);
  color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: 100px;
  width: fit-content;
}
.featured-badge .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
.featured-title {
  font-family: var(--display);
  font-size: clamp(32px, 4vw, 48px);
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-top: 20px;
}
.featured-tag {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--accent-2);
  margin-top: 10px;
  letter-spacing: 0.05em;
}
.featured-desc {
  color: var(--text-dim);
  font-size: 15px;
  margin-top: 18px;
  line-height: 1.65;
  max-width: 460px;
}
.featured-ctas { display: flex; gap: 12px; flex-wrap: wrap; }

.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 24px;
}
.game-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: all .3s;
  display: flex; flex-direction: column;
  position: relative;
}
.game-card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: var(--radius-lg);
  padding: 1px;
  background: linear-gradient(135deg, transparent, var(--accent) 50%, transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
}
.game-card:hover { transform: translateY(-4px); border-color: transparent; }
.game-card:hover::after { opacity: 1; }
.game-card:hover .game-art::before { opacity: 0.6; }
.game-art {
  aspect-ratio: 16 / 10;
  position: relative;
  overflow: hidden;
  background: var(--bg-2);
}
.game-art::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 40%, var(--bg) 100%);
  z-index: 2;
  opacity: 0.4;
  transition: opacity .3s;
}
.game-status {
  position: absolute;
  top: 14px; left: 14px;
  z-index: 3;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  padding: 5px 10px;
  border-radius: 100px;
  background: rgba(7, 11, 20, 0.8);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border-strong);
  display: inline-flex; align-items: center; gap: 6px;
}
.game-status .dot {
  width: 5px; height: 5px; border-radius: 50%;
}
.game-status.live .dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.game-status.live { color: var(--accent); border-color: var(--accent); }
.game-status.soon .dot { background: var(--accent-2); box-shadow: 0 0 6px var(--accent-2); }
.game-status.soon { color: var(--accent-2); border-color: var(--accent-2); }
.game-status.classic .dot { background: var(--text-muted); }
.game-status.classic { color: var(--text-muted); }

.game-year {
  position: absolute;
  bottom: 14px; right: 14px;
  z-index: 3;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  letter-spacing: 0.1em;
  opacity: 0.7;
}
.game-body {
  padding: 20px;
  display: flex; flex-direction: column; gap: 6px;
}
.game-title {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.game-genre {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.engine-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 8px;
  border-radius: 3px;
  background: linear-gradient(135deg, oklch(0.55 0.2 300 / 0.18), oklch(0.62 0.18 260 / 0.12));
  border: 1px solid oklch(0.62 0.18 280 / 0.35);
  color: oklch(0.85 0.14 290);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 600;
}
.news-image {
  margin: -32px -32px 20px;
  height: 180px;
  overflow: hidden;
  position: relative;
  border-radius: 6px 6px 0 0;
  border-bottom: 1px solid var(--border);
}
.news-image img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.4s ease;
}
.news-card:hover .news-image img { transform: scale(1.05); }

/* placeholder art */
.ph-art {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  overflow: hidden;
}
.ph-art .bg {
  position: absolute; inset: 0;
  opacity: 0.9;
}
.ph-art .stripes {
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    45deg,
    rgba(255,255,255,0.025) 0 2px,
    transparent 2px 10px
  );
}
.ph-art .label {
  position: relative; z-index: 2;
  font-family: var(--display);
  font-weight: 600;
  font-size: 28px;
  letter-spacing: -0.01em;
  color: rgba(255,255,255,0.92);
  text-align: center;
  text-shadow: 0 2px 20px rgba(0,0,0,0.6);
  padding: 0 20px;
  text-transform: uppercase;
  font-style: italic;
}
.ph-art .sublabel {
  position: relative; z-index: 2;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.6);
  margin-top: 8px;
  text-transform: uppercase;
}

/* ---- team ---- */
.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  gap: 24px;
  margin-top: 56px;
}
.team-card {
  background: var(--panel);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  padding: 40px;
  position: relative;
  overflow: hidden;
  transition: all .3s;
}
.team-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 40%; height: 1px;
  background: linear-gradient(90deg, var(--accent), transparent);
}
.team-card:hover { border-color: var(--accent); transform: translateY(-3px); }
.team-head {
  display: flex; align-items: center; gap: 20px;
  margin-bottom: 24px;
}
.team-avatar {
  width: 88px; height: 88px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  padding: 3px;
  background: var(--bg);
  box-shadow: 0 0 20px var(--glow);
  position: relative;
}
.team-avatar img {
  width: 100%; height: 100%;
  border-radius: 50%;
  object-fit: cover;
}
.team-avatar::before {
  content: "";
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1px dashed var(--accent);
  opacity: 0.3;
  animation: spin 20s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.team-name {
  font-family: var(--display);
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.015em;
}
.team-role {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--accent);
  text-transform: uppercase;
  margin-top: 4px;
}
.team-body { color: var(--text-dim); line-height: 1.7; font-size: 15px; margin-bottom: 24px; }
.team-specs {
  display: grid; gap: 10px;
  padding: 20px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 12px;
  margin-bottom: 20px;
}
.team-spec { display: flex; justify-content: space-between; gap: 12px; }
.team-spec .k { color: var(--text-muted); letter-spacing: 0.08em; }
.team-spec .v { color: var(--text); text-align: right; }
.team-setup {
  margin-bottom: 16px;
  padding: 14px 16px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.team-setup-label {
  font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.team-setup-list { display: flex; flex-direction: column; gap: 6px; }
.team-setup-row {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono); font-size: 11px;
}
.team-setup-row .k { color: var(--text-muted); letter-spacing: 0.08em; }
.team-setup-row .v { color: var(--text); }
.focus-chip {
  font-family: var(--mono);
  font-size: 9px; letter-spacing: 0.08em;
  padding: 2px 7px; border-radius: 3px;
  background: oklch(0.5 0.12 220 / 0.12);
  border: 1px solid oklch(0.5 0.12 220 / 0.35);
  color: var(--accent-2);
}
.team-projects {
  margin-bottom: 16px;
}
.team-projects-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.team-projects-chips {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.proj-chip {
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 3px;
  border: 1px solid oklch(0.55 0.14 var(--chip-hue, 165) / 0.5);
  background: oklch(0.55 0.14 var(--chip-hue, 165) / 0.1);
  color: oklch(0.78 0.12 var(--chip-hue, 165));
  text-decoration: none;
  transition: background .15s, border-color .15s;
}
.proj-chip:hover {
  background: oklch(0.55 0.14 var(--chip-hue, 165) / 0.22);
  border-color: oklch(0.55 0.14 var(--chip-hue, 165) / 0.8);
}
.team-links {
  display: flex; flex-wrap: wrap; gap: 10px;
}
.team-links-label {
  width: 100%;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-bottom: 2px;
}
.team-link {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono);
  font-size: 12px;
  padding: 10px 14px;
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  color: var(--text-dim);
  transition: all .2s;
  letter-spacing: 0.05em;
}
.team-link:hover { color: var(--accent); border-color: var(--accent); }

/* ---- goals ---- */
.goals-layout {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 80px;
  align-items: start;
  margin-top: 56px;
}
@media (max-width: 900px) { .goals-layout { grid-template-columns: 1fr; gap: 48px; } }
.goals-body { color: var(--text-dim); font-size: 17px; line-height: 1.7; }
.goals-pillars { display: grid; gap: 16px; }
.pillar {
  padding: 24px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-left: 2px solid var(--accent);
  border-radius: 4px;
  transition: all .3s;
}
.pillar:hover {
  border-left-width: 4px;
  padding-left: 26px;
  background: var(--panel-2);
}
.pillar-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.15em;
  margin-bottom: 8px;
}
.pillar-title {
  font-family: var(--display);
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.pillar-body { color: var(--text-dim); font-size: 14px; line-height: 1.6; }

/* ---- news ---- */
.news-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  margin-top: 56px;
}
.news-card {
  padding: 32px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  transition: all .3s;
  display: flex; flex-direction: column;
  gap: 16px;
  position: relative;
}
.news-card:hover { border-color: var(--accent-2); transform: translateY(-3px); background: var(--panel-2); }
.news-meta {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--text-muted);
}
.news-tag {
  padding: 4px 8px;
  background: rgba(108, 211, 255, 0.08);
  color: var(--accent-2);
  border-radius: 3px;
}
.news-title {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.2;
}
.news-body { color: var(--text-dim); font-size: 14px; line-height: 1.65; }
.news-read {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 0.08em;
  margin-top: auto;
  display: inline-flex; align-items: center; gap: 6px;
  cursor: pointer;
}
.news-read:hover { gap: 10px; }

/* ---- community ---- */
.community {
  padding: 120px 0;
  position: relative;
  overflow: hidden;
}
.community-panel {
  position: relative;
  padding: 80px;
  background:
    radial-gradient(600px 300px at 20% 0%, oklch(0.82 0.16 165 / 0.15), transparent 70%),
    radial-gradient(600px 300px at 100% 100%, oklch(0.82 0.14 220 / 0.12), transparent 70%),
    var(--panel);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  display: grid;
  grid-template-columns: 1.3fr 1fr;
  gap: 60px;
  align-items: center;
}
.community-panel::before, .community-panel::after {
  content: "";
  position: absolute;
  width: 32px; height: 32px;
  border: 1.5px solid var(--accent);
}
.community-panel::before { top: -1px; left: -1px; border-right: none; border-bottom: none; box-shadow: -4px -4px 18px var(--glow); }
.community-panel::after { bottom: -1px; right: -1px; border-left: none; border-top: none; box-shadow: 4px 4px 18px var(--glow); }
@media (max-width: 900px) {
  .community-panel { grid-template-columns: 1fr; padding: 48px 32px; gap: 40px; }
}
.community-body { color: var(--text-dim); font-size: 17px; line-height: 1.7; margin: 20px 0 32px; }
.community-stats {
  display: grid; gap: 20px;
  font-family: var(--mono);
}
.community-stat {
  padding: 20px;
  background: rgba(7, 11, 20, 0.6);
  border: 1px solid var(--border-strong);
  border-radius: 8px;
}
.community-stat-num {
  font-family: var(--display);
  font-size: 56px;
  font-weight: 500;
  color: var(--accent);
  line-height: 1;
  letter-spacing: -0.03em;
  text-shadow: 0 0 30px var(--glow);
}
.community-stat-label {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 10px;
}

/* ---- contact ---- */
.contact-layout {
  display: grid;
  grid-template-columns: 1fr 1.3fr;
  gap: 80px;
  align-items: start;
  margin-top: 56px;
}
@media (max-width: 900px) { .contact-layout { grid-template-columns: 1fr; gap: 48px; } }
.contact-form { display: grid; gap: 20px; }
.field { display: grid; gap: 8px; }
.field label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.field input, .field textarea {
  background: var(--panel);
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  padding: 14px 16px;
  color: var(--text);
  font-family: var(--body);
  font-size: 15px;
  resize: vertical;
  transition: all .2s;
}
.field input:focus, .field textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--glow);
  background: var(--panel-2);
}
.contact-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 600px) { .contact-row { grid-template-columns: 1fr; } }

.contact-submit {
  margin-top: 8px;
  justify-self: start;
}

/* ---- footer ---- */
.footer {
  padding: 60px 0 30px;
  border-top: 1px solid var(--border);
  margin-top: 80px;
}
.footer-inner {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr;
  gap: 60px;
  padding-bottom: 40px;
}
@media (max-width: 700px) { .footer-inner { grid-template-columns: 1fr; gap: 32px; } }
.footer-brand { max-width: 320px; }
.footer-brand .logo { margin-bottom: 16px; }
.footer-brand p { color: var(--text-dim); font-size: 14px; line-height: 1.6; }
.footer-col h4 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.footer-col a {
  display: block;
  color: var(--text-dim);
  font-size: 14px;
  padding: 6px 0;
  transition: color .2s;
}
.footer-col a:hover { color: var(--accent); }
.footer-bottom {
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px;
  padding-top: 30px;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
}

/* ---- modal ---- */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(7, 11, 20, 0.8);
  backdrop-filter: blur(10px);
  z-index: 100;
  display: grid; place-items: center;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.modal-backdrop.open { opacity: 1; pointer-events: auto; }
.modal {
  width: 100%;
  max-width: 880px;
  background: var(--panel);
  border: 1px solid var(--accent);
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 80px var(--glow), 0 40px 100px rgba(0,0,0,0.6);
  transform: scale(0.96);
  transition: transform .25s;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-backdrop.open .modal { transform: scale(1); }
.modal-art {
  aspect-ratio: 16/8;
  position: relative;
  overflow: hidden;
}
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  z-index: 10;
  width: 38px; height: 38px;
  display: grid; place-items: center;
  background: rgba(7, 11, 20, 0.8);
  border: 1px solid var(--border-strong);
  border-radius: 50%;
  color: var(--text);
  font-size: 16px;
  backdrop-filter: blur(8px);
  transition: all .2s;
}
.modal-close:hover { border-color: var(--accent); color: var(--accent); transform: rotate(90deg); }
.modal-body { padding: 40px; }
.modal-title {
  font-family: var(--display);
  font-size: 40px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1;
}
.modal-tag {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--accent-2);
  margin-top: 8px;
}
.modal-desc {
  color: var(--text-dim);
  font-size: 16px;
  line-height: 1.7;
  margin: 24px 0 32px;
}
.modal-specs {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: 28px;
}
.modal-spec {
  padding: 16px 20px;
  background: var(--panel-2);
  font-family: var(--mono);
  font-size: 12px;
}
.modal-spec .k {
  color: var(--text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-size: 10px;
  margin-bottom: 6px;
}
.modal-spec .v { color: var(--text); font-size: 13px; }
.modal-actions { display: flex; gap: 12px; flex-wrap: wrap; }

/* ---- game modal carousel ---- */
.modal-carousel {
  aspect-ratio: 16/8;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}
.carousel-img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity .2s;
}
.carousel-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 42px; height: 42px;
  background: rgba(7, 11, 20, 0.75);
  border: 1px solid var(--border-strong);
  border-radius: 50%;
  color: var(--text);
  font-size: 22px;
  display: grid; place-items: center;
  backdrop-filter: blur(6px);
  transition: all .2s;
  z-index: 5;
}
.carousel-btn:hover { border-color: var(--accent); color: var(--accent); }
.carousel-prev { left: 16px; }
.carousel-next { right: 16px; }
.carousel-dots {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; align-items: center;
  z-index: 5;
}
.carousel-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.25);
  border: none; cursor: pointer; padding: 0;
  transition: background .2s, transform .2s;
}
.carousel-dot.active {
  background: var(--accent);
  transform: scale(1.4);
}
/* ---- modal devlogs section ---- */
.modal-devlogs {
  margin-top: 36px;
  border-top: 1px solid var(--border);
  padding-top: 28px;
}
.modal-devlogs-title {
  font-family: var(--mono);
  font-size: 11px; letter-spacing: 0.15em;
  color: var(--text-muted);
  margin-bottom: 16px;
}
.modal-devlogs-list {
  display: flex; flex-direction: column; gap: 10px;
}
.modal-devlog-item {
  padding: 16px 20px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color .2s;
}
.modal-devlog-item:hover { border-color: var(--accent); }
.modal-devlog-meta {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  font-family: var(--mono); font-size: 10px;
  color: var(--text-muted); letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.modal-devlog-title {
  font-weight: 600; font-size: 14px; color: var(--text);
  margin-bottom: 4px;
}
.modal-devlog-body {
  font-size: 13px; color: var(--text-dim); line-height: 1.5;
  margin: 0;
}
/* ---- news game badge ---- */
.news-game-badge {
  display: inline-block;
  font-family: var(--mono); font-size: 9px;
  padding: 2px 7px; border-radius: 3px;
  background: oklch(0.5 0.14 165 / 0.12);
  border: 1px solid oklch(0.5 0.14 165 / 0.35);
  color: var(--accent);
  letter-spacing: 0.08em; text-transform: uppercase;
}

/* ---- tweaks panel ---- */
.tweaks-panel {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 320px;
  background: var(--panel);
  border: 1px solid var(--accent);
  border-radius: var(--radius-lg);
  padding: 20px;
  z-index: 80;
  box-shadow: 0 10px 60px rgba(0,0,0,0.5), 0 0 30px var(--glow);
  transform: translateY(calc(100% + 40px));
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
  font-family: var(--mono);
}
.tweaks-panel.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
.tweaks-panel h3 {
  font-family: var(--display);
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  display: flex; justify-content: space-between; align-items: center;
}
.tweaks-panel > p {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 18px;
}
.tweak-row { margin-bottom: 16px; }
.tweak-row > label {
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  text-transform: uppercase;
  display: block;
  margin-bottom: 8px;
}
.tweak-options { display: flex; gap: 6px; flex-wrap: wrap; }
.tweak-opt {
  flex: 1;
  padding: 8px 10px;
  background: var(--bg-2);
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all .15s;
  text-align: center;
  letter-spacing: 0.05em;
}
.tweak-opt:hover { color: var(--text); border-color: var(--text-dim); }
.tweak-opt.active { background: var(--accent); color: #041812; border-color: var(--accent); font-weight: 600; }
.tweak-swatches { display: flex; gap: 8px; }
.tweak-swatch {
  flex: 1;
  aspect-ratio: 1;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all .15s;
  position: relative;
}
.tweak-swatch.active { border-color: white; box-shadow: 0 0 16px currentColor; }

/* --- layout variant: centered hero */
body[data-hero="centered"] .hero-inner { text-align: center; justify-items: center; }
body[data-hero="centered"] .hero-frame { display: none; }
body[data-hero="centered"] .hero-title, body[data-hero="centered"] .hero-sub { margin-left: auto; margin-right: auto; }
body[data-hero="centered"] .hero-ctas { justify-content: center; }

/* --- background variant */
body[data-bg="dots"] .grid-bg {
  background-image: radial-gradient(circle, rgba(148, 197, 255, 0.1) 1px, transparent 1px);
  background-size: 28px 28px;
}
body[data-bg="lines"] .grid-bg {
  background-image: repeating-linear-gradient(
    0deg,
    rgba(148, 197, 255, 0.04) 0 1px,
    transparent 1px 80px
  );
}
body[data-bg="none"] .grid-bg { display: none; }

/* --- card style variant */
body[data-cards="sharp"] .game-card, body[data-cards="sharp"] .featured-card { border-radius: 2px; }
body[data-cards="sharp"] .news-card { border-radius: 2px; }

/* Animations on scroll */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity .8s ease, transform .8s ease; }
.reveal.shown { opacity: 1; transform: translateY(0); }

/* Corner ticks for sections */
.section-head { position: relative; }
.section-head::before {
  content: "";
  position: absolute;
  left: -24px; top: 8px;
  width: 12px; height: 12px;
  border-left: 1px solid var(--accent);
  border-top: 1px solid var(--accent);
}

/* utility */
.flex { display: flex; }
.hidden { display: none !important; }

/* ---- engine tags ---- */
.etag {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  letter-spacing: 0.12em; padding: 3px 8px; border-radius: 3px;
  text-transform: uppercase; white-space: nowrap;
}
.etag-roblox { background: oklch(0.82 0.16 165 / 0.14); border: 1px solid oklch(0.82 0.16 165 / 0.4); color: var(--accent); }
.etag-ue5    { background: oklch(0.55 0.2 300 / 0.15);  border: 1px solid oklch(0.62 0.18 280 / 0.45); color: oklch(0.85 0.14 290); }
.etag-unity  { background: oklch(0.82 0.14 220 / 0.12); border: 1px solid oklch(0.82 0.14 220 / 0.35); color: var(--accent-2); }
.etag-godot  { background: oklch(0.55 0.18 250 / 0.15); border: 1px solid oklch(0.6 0.16 250 / 0.4);  color: oklch(0.78 0.15 250); }
.etag-custom { background: var(--bg-2); border: 1px solid var(--border-strong); color: var(--text-muted); }

/* engine tag in art overlay */
.game-engine-overlay {
  position: absolute; top: 14px; right: 14px;
  z-index: 3;
}

/* ---- platform badges ---- */
.platform-badges {
  display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px;
}
.featured-meta-row {
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-top: 10px;
}
.featured-meta-row .platform-badges { margin-top: 0; }
.pbadge {
  display: inline-flex; align-items: center; gap: 3px;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
  padding: 3px 7px; border-radius: 3px;
  background: var(--bg-2); border: 1px solid var(--border-strong);
  color: var(--text-muted); text-transform: uppercase;
}
.pbadge svg { opacity: 0.8; }

/* admin platform checkboxes */
.platform-checks {
  display: flex; gap: 14px; flex-wrap: wrap;
  padding: 10px 12px;
  background: var(--panel); border: 1px solid var(--border-strong); border-radius: 4px;
}
.platform-check-item {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 11px; color: var(--text-dim);
  cursor: pointer; user-select: none;
}
.platform-check-item input { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; }

/* responsive */
@media (max-width: 800px) {
  .nav-links { display: none; }

  place-items: center;
  padding: 40px;
  min-height: 260px;
  overflow: hidden;
}

  content: "";

  background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 10px);
}

  width: 128px; height: 128px;
  border-radius: 26px;
  background: #000;

  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px var(--glow);
  border: 2px solid var(--accent);
}
.rblx-mark span {
  font-family: var(--display);
  font-size: 72px;
  font-weight: 700;
  line-height: 1;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  transform: translateY(-2px);
}
.rblx-body {
  padding: 36px 40px;

}
.rblx-tag {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.18em;
  display: inline-flex; align-items: center; gap: 8px;
}
.rblx-tag::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%;

}
.rblx-name {
  font-family: var(--display);
  font-size: 32px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.rblx-sub { color: var(--text-dim); font-size: 15px; line-height: 1.6; max-width: 500px; }
.rblx-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-top: 4px;
  border-radius: 6px;
  overflow: hidden;
}
.rblx-stat {
  padding: 14px 18px;
  background: var(--bg-2);
  font-family: var(--mono);
}
.rblx-stat-num {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.01em;
}
.rblx-stat-label {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;

}
.rblx-cta { margin-top: 6px; }

/* ---- Unreal Engine 5 teaser ---- */
.unreal {
  padding: 80px 0;
}
.unreal-card {
  position: relative;
  overflow: hidden;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-strong);
  background: #05070c;
  padding: 60px;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 60px;
  align-items: center;
}
@media (max-width: 900px) {
  .unreal-card { grid-template-columns: 1fr; padding: 40px 28px; gap: 32px; }
}
.unreal-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(700px 400px at 85% 15%, oklch(0.5 0.18 280 / 0.3), transparent 70%),
    radial-gradient(500px 300px at 15% 100%, oklch(0.5 0.2 25 / 0.2), transparent 70%);
  pointer-events: none;
}
.unreal-card::after {
  content: "";
  position: absolute; inset: 0;
  background-image:
    linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  pointer-events: none;
}
.unreal-content { position: relative; z-index: 2; }
.unreal-kicker {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  border: 1px solid oklch(0.5 0.18 280);
  color: oklch(0.85 0.15 280);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  border-radius: 100px;
  background: oklch(0.5 0.18 280 / 0.1);
  width: fit-content;
}
.unreal-kicker .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: oklch(0.85 0.15 280);
  box-shadow: 0 0 8px oklch(0.85 0.15 280);
  animation: pulse 2s ease-in-out infinite;
}
.unreal-title {
  font-family: var(--display);
  font-size: clamp(32px, 4.5vw, 56px);
  font-weight: 500;
  letter-spacing: -0.025em;
  line-height: 1;
  margin-top: 18px;
  text-wrap: balance;
}
.unreal-body {
  color: var(--text-dim);
  font-size: 17px;
  line-height: 1.65;
  margin: 22px 0 28px;
  max-width: 540px;
}
.unreal-meta {
  display: flex; gap: 40px; flex-wrap: wrap;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 12px;
}
.unreal-meta-item .k {
  color: var(--text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-size: 10px;
  margin-bottom: 4px;
}
.unreal-meta-item .v { color: var(--text); }

.ue5-visual {
  position: relative;
  z-index: 2;
  aspect-ratio: 4 / 5;
  display: grid;
  place-items: center;
  background:
    radial-gradient(ellipse at center, oklch(0.5 0.18 280 / 0.5), transparent 70%),
    #000;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border-strong);
}
.ue5-visual::before {
  content: "";
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 8px);
  animation: scan 8s linear infinite;
}
@keyframes scan { from { background-position: 0 0; } to { background-position: 0 100%; } }
.ue5-logo {
  position: relative; z-index: 2;
  text-align: center;
  font-family: var(--display);
  color: white;
  letter-spacing: -0.04em;
}
.ue5-logo .big {
  font-size: 120px;
  font-weight: 700;
  line-height: 0.85;
  background: linear-gradient(135deg, #fff 20%, oklch(0.7 0.18 280));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 60px oklch(0.5 0.18 280 / 0.5);
}
.ue5-logo .sub {
  font-family: var(--mono);
  font-size: 11px;
  color: oklch(0.85 0.15 280);
  letter-spacing: 0.25em;
  margin-top: 8px;
  text-transform: uppercase;
}
.ue5-corners::before, .ue5-corners::after {
  content: "";
  position: absolute;
  width: 20px; height: 20px;
  border: 1.5px solid oklch(0.85 0.15 280);
}
.ue5-corners::before { top: 12px; left: 12px; border-right: none; border-bottom: none; }
.ue5-corners::after { bottom: 12px; right: 12px; border-left: none; border-top: none; }

/* ---- Admin Panel ---- */
.admin-fab {
  position: fixed;
  bottom: 24px; left: 24px;
  z-index: 70;
  width: 44px; height: 44px;
  display: grid; place-items: center;
  background: var(--panel);
  border: 1px solid var(--border-strong);
  border-radius: 50%;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 14px;
  cursor: pointer;
  transition: all .2s;

.admin-fab:hover { opacity: 1; color: var(--accent); border-color: var(--accent); box-shadow: 0 0 20px var(--glow); }

.admin-overlay {
  position: fixed; inset: 0;
  background: rgba(5, 7, 12, 0.85);
  backdrop-filter: blur(14px);
  z-index: 200;
  display: grid; place-items: center;
  padding: 24px;

}

.admin-window {
  width: 100%;

  max-height: 90vh;
  background: var(--panel);
  border: 1px solid var(--accent);

  display: flex; flex-direction: column;

.admin-header {
  display: flex; align-items: center; justify-content: space-between;

}

  width: 36px; height: 36px;

}
.admin-login-icon span { transform: rotate(-45deg); color: var(--accent); }

  font-family: var(--display);
  font-size: 24px;

  letter-spacing: -0.01em;
}

  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 12px;
}
.admin-login input {
  width: 100%;

  background: var(--bg-2);
  border: 1px solid var(--border-strong);
  border-radius: 6px;

  font-size: 14px;

}
.admin-login input:focus {

  color: var(--text-dim);

  font-weight: 500;
  color: var(--accent);

.admin-field { display: grid; gap: 6px; }

  box-shadow: 0 0 0 2px var(--glow);
}

.admin-empty {

  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

  // Session: stored value is expiry timestamp (ms). Valid if in the future.
  const sessionValid = () => {
    const exp = parseInt(sessionStorage.getItem(LS_ADMIN_AUTH) || "0");
    return Date.now() < exp;
  };

  const [authed, setAuthed] = React.useState(sessionValid);
  const [pwd, setPwd] = React.useState("");
  const [err, setErr] = React.useState("");
  const [lockoutLeft, setLockoutLeft] = React.useState(0); // seconds remaining

  const [cpFields, setCpFields] = React.useState({ cur: "", next: "", confirm: "" });
  const [cpErr, setCpErr] = React.useState("");

  // Tick lockout countdown
  React.useEffect(() => {
    const lockout = parseInt(localStorage.getItem(LS_ADMIN_LOCKOUT) || "0");
    if (Date.now() < lockout) {
      setLockoutLeft(Math.ceil((lockout - Date.now()) / 1000));
      const id = setInterval(() => {
        const rem = Math.ceil((parseInt(localStorage.getItem(LS_ADMIN_LOCKOUT) || "0") - Date.now()) / 1000);
        if (rem <= 0) { clearInterval(id); setLockoutLeft(0); setErr(""); }
        else setLockoutLeft(rem);
      }, 1000);
      return () => clearInterval(id);
    }
  }, [open]);

  React.useEffect(() => {
    if (!open) { setEditing(null); setPwd(""); setErr(""); setChangingPwd(false); setCpFields({ cur: "", next: "", confirm: "" }); setCpErr(""); }
  }, [open]);

  const tryLogin = async () => {
    // Check lockout
    const lockout = parseInt(localStorage.getItem(LS_ADMIN_LOCKOUT) || "0");
    if (Date.now() < lockout) {
      const rem = Math.ceil((lockout - Date.now()) / 60000);
      setErr(`Bloqueado. Aguarde ${rem} min.`);
      return;
    }

    const storedHash = localStorage.getItem(LS_ADMIN_HASH);
    const inputHash = await sha256hex(pwd);

    if (inputHash === storedHash) {
      localStorage.removeItem(LS_ADMIN_ATTEMPTS);
      localStorage.removeItem(LS_ADMIN_LOCKOUT);
      sessionStorage.setItem(LS_ADMIN_AUTH, (Date.now() + SESSION_MS).toString());
      setAuthed(true);
      setErr("");
      setLockoutLeft(0);
    } else {
      const attempts = parseInt(localStorage.getItem(LS_ADMIN_ATTEMPTS) || "0") + 1;
      localStorage.setItem(LS_ADMIN_ATTEMPTS, attempts.toString());
      if (attempts >= MAX_ATTEMPTS) {
        const exp = Date.now() + LOCKOUT_MS;
        localStorage.setItem(LS_ADMIN_LOCKOUT, exp.toString());
        localStorage.removeItem(LS_ADMIN_ATTEMPTS);
        setLockoutLeft(LOCKOUT_MS / 1000);
        setErr("Muitas tentativas incorretas. Bloqueado por 5 minutos.");
      } else {
        const left = MAX_ATTEMPTS - attempts;
        setErr(`${t.admin_wrong} — ${left} tentativa${left !== 1 ? "s" : ""} restante${left !== 1 ? "s" : ""}.`);
        setTimeout(() => setErr(""), 3000);
      }
    }
    setPwd("");
  };

  const logout = () => {
    setAuthed(false);
    sessionStorage.removeItem(LS_ADMIN_AUTH);
    onClose();
  };

  const doChangePassword = async () => {
    setCpErr("");
    const storedHash = localStorage.getItem(LS_ADMIN_HASH);
    const curHash = await sha256hex(cpFields.cur);
    if (curHash !== storedHash) { setCpErr("Senha atual incorreta."); return; }
    if (cpFields.next.length < 8) { setCpErr("Nova senha: mínimo 8 caracteres."); return; }
    if (cpFields.next !== cpFields.confirm) { setCpErr("As senhas não coincidem."); return; }
    const newHash = await sha256hex(cpFields.next);
    localStorage.setItem(LS_ADMIN_HASH, newHash);
    setChangingPwd(false);
    setCpFields({ cur: "", next: "", confirm: "" });
    alert("Senha alterada com sucesso!");
  };

  const startAddGame = () => setEditing({
    type: "game", isNew: true,
    data: {
      id: uid(), title: "", tag: "", url: "", wiki: "",
      image: "", engine: "Roblox", platforms: ["PC", "Mobile", "Xbox"],
      images: [],
      genres: [],
      status: "live", featured: false,
      hue: 165, hue2: 220,
      desc_pt: "", desc_en: "", year: "2026",
    },
  });
  const startEditGame = (g) => setEditing({ type: "game", isNew: false, data: { ...g } });
  const deleteGame = (id) => {
    if (!confirm(t.admin_confirm_delete)) return;
    setGames(games.filter((g) => g.id !== id));
  };
  const saveGame = (d) => {
    if (editing.isNew) setGames([...games, d]);
    else setGames(games.map((g) => (g.id === d.id ? d : g)));
    setEditing(null);
  };

  const startAddDev = () => setEditing({
    type: "dev", isNew: true,
    data: {
      id: uid(), name: "", role: "dev",
      avatar: "", roblox: "", roblox_username: "", discord: "",
      focus: [],
      education_pt: "Formado em Análise e Desenvolvimento de Software",
      education_en: "Degree in Systems Analysis & Software Development",
      engines: ["Roblox"],
      cpu: "", gpu: "", ram: "",
      games: [],
    },
  });
  const startEditDev = (d) => setEditing({ type: "dev", isNew: false, data: { ...d } });
  const deleteDev = (id) => {
    if (!confirm(t.admin_confirm_delete)) return;
    setDevs(devs.filter((d) => d.id !== id));
  };
  const saveDev = (d) => {
    if (editing.isNew) setDevs([...devs, d]);
    else setDevs(devs.map((x) => (x.id === d.id ? d : x)));
    setEditing(null);
  };

  const startAddNews = () => setEditing({
    type: "news", isNew: true,
    data: {
      id: uid(),
      gameId: "",
      date_pt: "", date_en: "",
      tag: "DEVLOG",
      image: "",
      title_pt: "", title_en: "",
      body_pt: "", body_en: "",
      full_pt: "", full_en: "",
    },
  });
  const startEditNews = (n) => setEditing({ type: "news", isNew: false, data: { ...n } });
  const deleteNews = (id) => {
    if (!confirm(t.admin_confirm_delete)) return;
    setNews(news.filter((n) => n.id !== id));
  };
  const saveNews = (d) => {
    if (editing.isNew) setNews([d, ...news]);
    else setNews(news.map((x) => (x.id === d.id ? d : x)));
    setEditing(null);
  };

  const exportHTML = () => {
    const dataEl = document.getElementById('outside-data');
    const adminEl = document.getElementById('outside-admin');
    const appEl = document.getElementById('outside-app');
    const styleEl = document.querySelector('style');
    if (!dataEl || !adminEl || !appEl) { alert('IDs de script não encontrados. Reconstrua o HTML.'); return; }
    let dataScript = dataEl.textContent;
    let adminScript = adminEl.textContent;
    const appScript = appEl.textContent;
    const css = styleEl ? styleEl.textContent : '';
    dataScript = dataScript.replace(/\/\*GAMES_START\*\/[\s\S]*?\/\*GAMES_END\*\//, `/*GAMES_START*/${JSON.stringify(games, null, 2)}/*GAMES_END*/`);
    dataScript = dataScript.replace(/\/\*NEWS_START\*\/[\s\S]*?\/\*NEWS_END\*\//, `/*NEWS_START*/${JSON.stringify(news, null, 2)}/*NEWS_END*/`);
    adminScript = adminScript.replace(/\/\*DEVS_START\*\/[\s\S]*?\/\*DEVS_END\*\//, `/*DEVS_START*/${JSON.stringify(devs, null, 2)}/*DEVS_END*/`);
    const currentHash = localStorage.getItem('outside_admin_hash_v2') || '';
    if (currentHash) adminScript = adminScript.replace(/\/\*HASH_START\*\/[\s\S]*?\/\*HASH_END\*\//, `/*HASH_START*/"${currentHash}"/*HASH_END*/`);
    const headLinks = [...document.head.querySelectorAll('link, script[src]')].map(el => el.outerHTML).join('\n');
    const html = `<!doctype html>\n<html lang="pt">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<title>Outside Studio</title>\n${headLinks}\n<style>\n${css}\n</style>\n</head>\n<body>\n<div id="root"></div>\n<script id="outside-data">\n${dataScript}\n<\/script>\n<script id="outside-admin" type="text/babel">\n${adminScript}\n<\/script>\n<script id="outside-app" type="text/babel">\n${appScript}\n<\/script>\n</body>\n</html>`;
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'Outside Studio.html';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  };

  const resetAll = () => {
    if (!confirm(t.admin_confirm_delete)) return;

    localStorage.removeItem(LS_DEVS);
    localStorage.removeItem(LS_NEWS);
    setGames(window.OUTSIDE_GAMES.map((g) => ({ ...g })));
    setDevs(DEFAULT_DEVS.map((d) => ({ ...d })));
    setNews(window.OUTSIDE_NEWS.map((n) => ({ ...n })));
  };

  return (
    <div className={`admin-overlay ${open ? "open" : ""}`} onClick={onClose}>

        <div className="admin-header">

                placeholder="••••••••"

              {lockoutLeft > 0 && (

                  ⏱ {Math.floor(lockoutLeft / 60)}:{String(lockoutLeft % 60).padStart(2, "0")}
                </div>
              )}
              <button className="admin-btn primary" onClick={tryLogin} disabled={!!lockoutLeft}>
                {t.admin_login_btn} →
              </button>
            </div>
          </div>
        ) : (
          <>
            <div className="admin-tabs">
              <button className={`admin-tab ${tab === "games" ? "active" : ""}`} onClick={() => { setTab("games"); setEditing(null); }}>
                {t.admin_tab_games} ({games.length})
              </button>
              <button className={`admin-tab ${tab === "devs" ? "active" : ""}`} onClick={() => { setTab("devs"); setEditing(null); }}>

                DEVLOGS ({news.length})

            <div className="admin-body">

                    <button className="admin-btn danger" onClick={resetAll}>{t.admin_reset}</button>
                  </div>
                  {editing?.type === "game" && (
                    <GameForm editing={editing} onSave={saveGame} onCancel={() => setEditing(null)} t={t} />

                  <div className="admin-list">

                      <div className="admin-row" key={g.id}>
                        <div

                          {g.title[0] || "?"}

                        <div className="admin-row-info">

                            {g.title}{" "}

                          </div>
                          <div className="admin-row-sub">{(g.genres || []).join(" · ") || g.genre_pt || g.genre_en} · {g.status.toUpperCase()} · {g.year}</div>
                        </div>
                        <div className="admin-row-actions">
                          <button className="admin-icon-btn" title={t.admin_edit} onClick={() => startEditGame(g)}>✎</button>
                          <button className="admin-icon-btn danger" title={t.admin_delete} onClick={() => deleteGame(g.id)}>✕</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </>
              )}
              {tab === "devs" && (
                <>
                  <div className="admin-toolbar">
                    <button className="admin-btn primary" onClick={startAddDev}>{t.admin_add_dev}</button>
                  </div>
                  {editing?.type === "dev" && (
                    <DevForm editing={editing} onSave={saveDev} onCancel={() => setEditing(null)} t={t} games={games} />
                  )}
                  <div className="admin-list">
                    {devs.length === 0 && <div className="admin-empty">// NO DEVELOPERS YET</div>}
                    {devs.map((d) => (
                      <div className="admin-row" key={d.id}>
                        <div
                          className="admin-row-mark"
                          style={{ background: "var(--bg-2)", overflow: "hidden", padding: 0 }}
                        >
                          {d.avatar ? (
                            <img src={d.avatar} alt={d.name} style={{ width: "100%", height: "100%", objectFit: "cover" }} onError={(e) => { e.target.style.display = "none"; }} />
                          ) : d.name[0] || "?"}
                        </div>
                        <div className="admin-row-info">
                          <div className="admin-row-title">{d.name}</div>
                          <div className="admin-row-sub">{d.role === "head" ? "Head Developer" : "Developer"} · {(d.focus || []).join(", ") || (d.focus_pt || "")}</div>

                        </div>
                      </div>
                    ))}
                  </div>
                </>
              )}
              {tab === "news" && (
                <>
                  <div className="admin-toolbar">
                    <button className="admin-btn primary" onClick={startAddNews}>+ Adicionar Devlog</button>
                  </div>
                  {editing?.type === "news" && (
                    <NewsForm editing={editing} onSave={saveNews} onCancel={() => setEditing(null)} t={t} games={games} />
                  )}
                  <div className="admin-list">
                    {news.length === 0 && <div className="admin-empty">// NO DEVLOGS YET</div>}
                    {news.map((n) => (
                      <div className="admin-row" key={n.id}>
                        <div className="admin-row-mark" style={{ background: "linear-gradient(135deg, var(--accent), var(--accent-2))", color: "#041812" }}>◆</div>
                        <div className="admin-row-info">
                          <div className="admin-row-title">{n.title_pt || n.title_en}</div>
                          <div className="admin-row-sub">{n.date_pt || n.date_en} · {n.tag}</div>
                        </div>
                        <div className="admin-row-actions">
                          <button className="admin-icon-btn" onClick={() => startEditNews(n)}>✎</button>
                          <button className="admin-icon-btn danger" onClick={() => deleteNews(n.id)}>✕</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
            {changingPwd && (
              <div style={{ position: "absolute", inset: 0, background: "rgba(7,11,20,0.92)", zIndex: 10, display: "grid", placeItems: "center", padding: 32 }}>
                <div style={{ width: "100%", maxWidth: 400, background: "var(--panel)", border: "1px solid var(--accent)", borderRadius: 10, padding: 32, display: "grid", gap: 16 }}>
                  <div style={{ fontFamily: "var(--display)", fontSize: 18, fontWeight: 500, color: "var(--accent)" }}>// ALTERAR SENHA</div>
                  {[
                    { label: "Senha atual", key: "cur" },
                    { label: "Nova senha (mín. 8 chars)", key: "next" },
                    { label: "Confirmar nova senha", key: "confirm" },
                  ].map(({ label, key }) => (
                    <div className="admin-field" key={key}>
                      <label>{label}</label>
                      <input type="password" value={cpFields[key]} onChange={(e) => setCpFields({ ...cpFields, [key]: e.target.value })}
                        onKeyDown={(e) => e.key === "Enter" && doChangePassword()} />
                    </div>
                  ))}
                  {cpErr && <div style={{ fontFamily: "var(--mono)", fontSize: 11, color: "oklch(0.7 0.2 25)", letterSpacing: "0.08em" }}>{cpErr}</div>}
                  <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
                    <button className="admin-btn" onClick={() => { setChangingPwd(false); setCpErr(""); setCpFields({ cur: "", next: "", confirm: "" }); }}>Cancelar</button>
                    <button className="admin-btn primary" onClick={doChangePassword}>Salvar →</button>
                  </div>
                </div>
              </div>
            )}
            {authed && (
              <div className="admin-footer" style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <button className="admin-text-link" onClick={() => setChangingPwd(true)}>🔑 Alterar senha</button>

                <button className="admin-text-link" onClick={logout}>← {t.admin_logout}</button>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
};

const Carousel = ({ images, game, onClose }) => {
  const [idx, setIdx] = React.useState(0);
  React.useEffect(() => setIdx(0), [game && game.id]);
  const imgs = images && images.filter(x => x).length > 0 ? images.filter(x => x) : null;
  if (!imgs) {
    return (
      <div className="modal-art">
        <PlaceholderArt game={game} large />
        <button className="modal-close" onClick={onClose}>✕</button>
      </div>
    );
  }
  const prev = (e) => { e.stopPropagation(); setIdx((idx - 1 + imgs.length) % imgs.length); };
  const next = (e) => { e.stopPropagation(); setIdx((idx + 1) % imgs.length); };
  return (
    <div className="modal-carousel">
      <img key={idx} src={imgs[idx]} alt="" className="carousel-img" onError={(e) => { e.target.style.opacity = 0.15; }} />
      {imgs.length > 1 && (
        <>
          <button className="carousel-btn carousel-prev" onClick={prev}>‹</button>
          <button className="carousel-btn carousel-next" onClick={next}>›</button>
          <div className="carousel-dots">
            {imgs.map((_, i) => (
              <button key={i} className={`carousel-dot${i === idx ? " active" : ""}`} onClick={(e) => { e.stopPropagation(); setIdx(i); }} />
            ))}
          </div>
        </>
      )}
      <button className="modal-close" onClick={onClose}>✕</button>
    </div>
  );
};

const TWEAK_DEFAULTS = {
  accent: "emerald",
  hero: "default",
  bg: "grid",
  cards: "round"
};

const accentMap = {
  emerald: { a: "oklch(0.82 0.16 165)", a2: "oklch(0.82 0.14 220)", glow: "oklch(0.82 0.16 165 / 0.35)" },
  cyan: { a: "oklch(0.82 0.14 220)", a2: "oklch(0.82 0.16 165)", glow: "oklch(0.82 0.14 220 / 0.35)" },
  purple: { a: "oklch(0.72 0.2 300)", a2: "oklch(0.82 0.14 220)", glow: "oklch(0.72 0.2 300 / 0.35)" },
  orange: { a: "oklch(0.78 0.16 55)", a2: "oklch(0.82 0.14 220)", glow: "oklch(0.78 0.16 55 / 0.35)" },
  pink: { a: "oklch(0.75 0.2 0)", a2: "oklch(0.82 0.14 220)", glow: "oklch(0.75 0.2 0 / 0.35)" },
};

const App = () => {
  const [lang, setLangState] = useState(getLang());
  const [modalGame, setModalGame] = useState(null);
  const [modalNews, setModalNews] = useState(null);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState({ ...TWEAK_DEFAULTS });
  const [adminOpen, setAdminOpen] = useState(false);
  const [games, setGamesState] = useState(() => window.loadLS(window.LS_GAMES, window.OUTSIDE_GAMES.map(g => ({...g}))));
  const [devs, setDevsState] = useState(() => window.loadLS(window.LS_DEVS, window.DEFAULT_DEVS.map(d => ({...d}))));
  const [news, setNewsState] = useState(() => window.loadLS(window.LS_NEWS, window.OUTSIDE_NEWS.map(n => ({...n, id: n.id || Math.random().toString(36).slice(2,9)}))));

  const setGames = (g) => { setGamesState(g); window.saveLS(window.LS_GAMES, g); };
  const setDevs = (d) => { setDevsState(d); window.saveLS(window.LS_DEVS, d); };
  const setNews = (n) => { setNewsState(n); window.saveLS(window.LS_NEWS, n); };

  const setLang = (l) => {
    setLangLS(l);
    setLangState(l);
    document.documentElement.lang = l === "pt" ? "pt-BR" : "en";
  };

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
  };

  // apply tweaks
  useEffect(() => {
    document.body.dataset.hero = tweaks.hero;
    document.body.dataset.bg = tweaks.bg;
    document.body.dataset.cards = tweaks.cards;
    const a = accentMap[tweaks.accent] || accentMap.emerald;
    document.documentElement.style.setProperty("--accent", a.a);
    document.documentElement.style.setProperty("--accent-2", a.a2);
    document.documentElement.style.setProperty("--glow", a.glow);
  }, [tweaks]);

  // admin open: #admin hash or Ctrl+Shift+A
  useEffect(() => {
    const checkHash = () => { if (location.hash === "#admin") setAdminOpen(true); };
    checkHash();
    window.addEventListener("hashchange", checkHash);
    const key = (e) => {
      if (e.ctrlKey && e.shiftKey && (e.key === "A" || e.key === "a")) {
        e.preventDefault(); setAdminOpen(true);
      }
    };
    window.addEventListener("keydown", key);
    return () => { window.removeEventListener("hashchange", checkHash); window.removeEventListener("keydown", key); };
  }, []);

  // reveal on scroll
  useEffect(() => {
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((en) => {
          if (en.isIntersecting) en.target.classList.add("shown");
        });
      },
      { threshold: 0.1 }
    );
    document.querySelectorAll(".reveal").forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, [lang]);

  return (
    <>
      <div className="grid-bg" />
      <div className="noise" />
      <Nav lang={lang} setLang={setLang} />
      <main>
        <Hero lang={lang} />
        <Games lang={lang} onOpen={setModalGame} games={games} />
        <window.UnrealTeaser lang={lang} />
        <Team lang={lang} members={devs} games={games} />
        <Goals lang={lang} />
        <News lang={lang} items={news} onOpen={setModalNews} games={games} />
        <Community lang={lang} />
        <window.RobloxCommunity lang={lang} />
      </main>
      <Footer lang={lang} games={games} />
      <Modal game={modalGame} lang={lang} onClose={() => setModalGame(null)} allNews={news} onOpenNews={setModalNews} />
      {modalNews && <NewsModal item={modalNews} lang={lang} onClose={() => setModalNews(null)} />}
      <TweaksPanel open={tweaksOpen} tweaks={tweaks} setTweak={setTweak} />
      <window.AdminPanel
        open={adminOpen}
        onClose={() => setAdminOpen(false)}
        games={games} setGames={setGames}
        devs={devs} setDevs={setDevs}
        news={news} setNews={setNews}
        lang={lang}
      />
      <button className="admin-fab" title="Admin (Ctrl+Shift+A)" onClick={() => setAdminOpen(true)}>◆</button>
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
<\/script>
</body>
</html>
