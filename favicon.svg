<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <rect width="48" height="48" rx="10" fill="#070b14"/>
  <defs>
    <linearGradient id="fg-stroke" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="fg-fill" x1="0" y1="0" x2="0" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- outer bracket frame -->
  <path d="M 8 4 H 4 V 12" stroke="url(#fg-stroke)" stroke-width="1.5" stroke-linecap="square"/>
  <path d="M 40 4 H 44 V 12" stroke="url(#fg-stroke)" stroke-width="1.5" stroke-linecap="square"/>
  <path d="M 8 44 H 4 V 36" stroke="url(#fg-stroke)" stroke-width="1.5" stroke-linecap="square"/>
  <path d="M 40 44 H 44 V 36" stroke="url(#fg-stroke)" stroke-width="1.5" stroke-linecap="square"/>
  <!-- rotated square — portal -->
  <g transform="rotate(45 24 24)">
    <rect x="10" y="10" width="28" height="28" stroke="url(#fg-stroke)" stroke-width="1.3" fill="url(#fg-fill)"/>
    <rect x="16" y="16" width="16" height="16" stroke="#22d3ee" stroke-opacity="0.7" stroke-width="1" fill="none"/>
  </g>
  <!-- center O -->
  <circle cx="24" cy="24" r="4.5" stroke="#4ade80" stroke-width="1.6" fill="none"/>
  <circle cx="24" cy="24" r="1.8" fill="#4ade80"/>
  <!-- arrow breaking out — top-right -->
  <path d="M 31 17 L 38 10 M 38 10 H 33 M 38 10 V 15" stroke="#4ade80" stroke-width="1.5" stroke-linecap="square" fill="none"/>
</svg>
